let bgmOn=false;

function toggleBgm(){
 const bgm=document.getElementById("bgm");
 const btn=document.getElementById("bgmBtn");
 if(!bgm)return;

 if(bgmOn){
  bgm.pause();
  bgmOn=false;
  if(btn)btn.textContent="音乐：关";
  localStorage.setItem("shanhe_bgm_on","0");
  return;
 }

 bgm.volume=0.45;
 bgm.play().then(()=>{
  bgmOn=true;
  if(btn)btn.textContent="音乐：开";
  localStorage.setItem("shanhe_bgm_on","1");
 }).catch(()=>{
  alert("浏览器限制自动播放，请再点一次音乐按钮");
 });
}
function restoreBgm(){
 const bgm=document.getElementById("bgm");
 const btn=document.getElementById("bgmBtn");
 if(!bgm)return;

 if(localStorage.getItem("shanhe_bgm_on")==="1"){
  bgm.volume=0.45;
  bgm.play().then(()=>{
   bgmOn=true;
   if(btn)btn.textContent="音乐：开";
  }).catch(()=>{
   bgmOn=false;
   if(btn)btn.textContent="音乐：关";
  });
 }else{

  if(btn)btn.textContent="音乐：关";
 }

function collectProduction(showLog=false){

 let q=p();

 if(!q.lastProduce)q.lastProduce=now();

 if(!q.productionBuildings){
  q.productionBuildings={
   耕地:{count:1,lv:1},
   林场:{count:1,lv:1},
   采矿场:{count:1,lv:1},
   坊市:{count:1,lv:1}
  };
 }

 let diff=now()-q.lastProduce;

 if(diff<60000)return;

 let minutes=Math.min(720,Math.floor(diff/60000));

 q.lastProduce+=minutes*60000;

 let field=productionPower("耕地");
 let wood=productionPower("林场");

  粮草:minutes*field*50,

  石料:minutes*mine*25,
  铁矿:minutes*mine*25,
  铜钱:minutes*market*40
 };

 gainRes(reward);

 if(showLog){
  log(`生产建筑产出：${costText(reward)}`);
 }else{
  save();
  renderRes();
 }
}

function scaleCost(base,multi){
 let cost={};
 for(let k in base){
  cost[k]=Math.ceil(base[k]*multi);
 }
 return cost;
}

function productionBuildCost(name){
 let b=p().productionBuildings[name];

}

function productionUpgradeCost(name){

}

function spawnInvasionIfNeeded(){if(seasonDay()<season.invasionDay||p().invasionSpawned)return;let keys=Object.keys(p().map).filter(k=>p().map[k].type!=="city");for(let i=0;i<24;i++){let t=p().map[pick(keys)];t.enemy=true;t.owner=season.invasionName}p().invasionSpawned=true;log(`${season.invasionName}入侵大地图！部分地块已被敌军占领。`);save()}
function revealNear(){
 for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
  let x=mapCenter.x+dx,y=mapCenter.y+dy;
  if(x>=0&&y>=0&&x<worldSize&&y<worldSize)p().seen[x+"_"+y]=true;
 }
}
function buildProduction(name){
 let cost=productionBuildCost(name);

 if(!spend(cost))return;

 p().productionBuildings[name].count++;

 log(`新建${name}，当前数量 ${p().productionBuildings[name].count}。`);

 renderAll();
}

function upgradeProduction(name){
 let cost=productionUpgradeCost(name);

 if(!spend(cost))return;

 p().productionBuildings[name].lv++;

 log(`${name}升级到 Lv.${p().productionBuildings[name].lv}。`);

 renderAll();
}
function moveMap(dx,dy){
 mapCenter.x=Math.max(2,Math.min(worldSize-3,mapCenter.x+dx));
 mapCenter.y=Math.max(2,Math.min(worldSize-3,mapCenter.y+dy));
 p().center=mapCenter;
 revealNear();
 save();
 loadWorldAround(()=>renderMap());
}
function tileName(t){return {resource:"资源地",fieldTile:"野外农庄",salt:"盐田",horse:"马场",mine:"灵矿",battlefield:"古战场",trade:"商路节点",npc:"NPC据点",city:"城池",pass:"关卡"}[t]}
function sym(t){return {resource:"资",fieldTile:"田",salt:"盐",horse:"马",mine:"矿",battlefield:"战",trade:"商",npc:"敌",city:"城",pass:"关"}[t]}
function renderMap(){revealNear();let html="";for(let y=mapCenter.y-2;y<=mapCenter.y+2;y++)for(let x=mapCenter.x-2;x<=mapCenter.x+2;x++){let t=p().map[x+"_"+y];
if(!t)continue;html+=`<div onclick="selTile('${x}_${y}')" class="tile ${t.type} ${t.owner===p().name?'owned':''} ${t.garrisonTeam?'garrison':''} ${t.enemy?'enemy':''} ${x===mapCenter.x&&y===mapCenter.y?'self':''} ${selectedTile===x+'_'+y?'sel':''}"><b>${sym(t.type)}</b><small>${x},${y}</small><small>${t.enemy?'敌军':t.garrisonTeam?'驻守':'Lv.'+t.lv}</small></div>`}
document.getElementById("page-map").innerHTML=`<h2>共享大地图 300×300，当前视野 5×5</h2><div class="stat"><b>${invasionText()}</b><p class="muted">赛季剩余 ${daysLeft()} 天。赛季中期后，${season.invasionName} 会进入地图并占领地块。</p></div><br><div class="row"><button onclick="moveMap(0,-1)">上</button><button onclick="moveMap(-1,0)">左</button><button onclick="moveMap(1,0)">右</button><button onclick="moveMap(0,1)">下</button></div><br><div class="mapbox"><div class="map">${html}</div></div>`}
function selTile(id){selectedTile=id;let t=p().map[id];side.innerHTML=`<div class="item"><h3>${tileName(t.type)} ${t.x},${t.y}</h3><p>等级：Lv.${t.lv}</p><p>地形：${t.terrain}</p><p>守军：${t.guard}</p><p>归属：${t.owner||"无"}</p><p>驻守：${t.garrisonTeam?teamName(t.garrisonTeam):"无"}</p><p>敌军：${t.enemy?"有":"无"}</p><select id="mapTeam">${p().teams.map(tm=>`<option value="${tm.id}">${tm.name}｜${teamPower(tm)}</option>`).join("")}</select><br><br><button onclick="marchOccupy('${id}')">派军队占领/进攻</button> <button onclick="scout('${id}')">侦查</button> <button onclick="withdrawGarrison('${id}')">撤回驻守</button></div>`;renderMap()}
function scout(id){let t=p().map[id];if(!spend({粮草:80}))return;log(`侦查：${tileName(t.type)} Lv.${t.lv} 守军约${t.guard} 地形${t.terrain} 归属${t.owner||"无"}`);renderAll()}
function marchOccupy(id){let team=p().teams.find(x=>x.id===mapTeam.value);if(!team)return alert("请先在军队页编队");let t=p().map[id];if(team.total<50)return alert("该队兵力不足50");if(team.status!=="空闲")return alert("该队不是空闲状态");let wasEnemy=t.enemy||t.owner===season.invasionName;let report=resolveTileBattle(team,t);p().reports.unshift(report);p().reports=p().reports.slice(0,80);if(report.result==="胜利"){
 if(wasEnemy)p().stats.enemyWins++;
 t.owner=p().name;
 t.enemy=false;
 t.garrisonTeam=team.id;
 team.status="驻守";
 team.tile=id;
 gainRes({赛季功勋:t.lv*10});
 fetch("/api/world/occupy",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache,tileId:id,owner:p().name,garrisonTeam:team.id})
 }).catch(()=>{});
 log(`${team.name}占领并驻守地块 ${t.x},${t.y}`);
}
else{team.status="空闲";team.tile="";log(`${team.name}进攻失败，生成战报。`)}save();renderAll();selTile(id)}
function withdrawGarrison(id){
 let t=p().map[id];
 if(!t.garrisonTeam)return alert("该地无驻守");
 let tm=p().teams.find(x=>x.id===t.garrisonTeam);
 if(tm){tm.status="空闲";tm.tile=""}
 t.garrisonTeam="";
 fetch("/api/world/withdraw",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache,tileId:id})
 }).catch(()=>{});
 log("撤回驻守军队。");
 renderAll();
 selTile(id);
}
function teamName(id){let tm=p().teams.find(x=>x.id===id);return tm?tm.name:"未知"}
function counterFactor(type,enemyType){if(!enemyType)return 1;return troopTypes[type]?.counter===enemyType?1.18:troopTypes[type]?.weak===enemyType?0.88:1}
function resolveTileBattle(team,tile){let enemyType=tile.enemy?"骑兵":tile.type==="city"||tile.type==="pass"?"城防":pick(["民兵","步兵","弓兵","枪兵","骑兵"]);let atk=teamPower(team)*counterFactor(mainTroop(team),enemyType)*(0.9+Math.random()*0.2);let def=(tile.guard+(tile.enemy?2500:0))*(tile.garrisonTeam?1.35:1)*(0.9+Math.random()*0.2);let win=atk>=def,loss=Math.ceil(team.total*(win?0.08+Math.random()*0.08:0.18+Math.random()*0.15));applyTeamLoss(team,loss);return {id:"r"+now()+Math.random(),time:new Date().toLocaleString(),title:`${team.name} 进攻 ${tileName(tile.type)} ${tile.x},${tile.y}`,result:win?"胜利":"失败",atk:Math.floor(atk),def:Math.floor(def),loss,enemyType,detail:`兵种克制：我方主力${mainTroop(team)}，敌方${enemyType}。胜利后必须驻守才能保有地块。`}}
function mainTroop(team){let arr=Object.entries(team.troops).sort((a,b)=>b[1]-a[1]);return arr[0]?.[0]||"民兵"}
function applyTeamLoss(team,loss){let left=loss;for(let k of Object.keys(team.troops)){let cut=Math.min(team.troops[k],left);team.troops[k]-=cut;left-=cut;if(left<=0)break}team.total=Object.values(team.troops).reduce((a,b)=>a+b,0)}

function unlockedTroops(){let lv=p().buildings.军营;return Object.keys(troopTypes).filter(k=>lv>=troopTypes[k].unlock)}
function renderBarracks(){let rows=Object.entries(troopTypes).map(([name,d])=>{let unlocked=p().buildings.军营>=d.unlock;return `<tr><td>${name}</td><td>${unlocked?"已解锁":"军营Lv."+d.unlock}</td><td>${p().troopStock[name]||0}</td><td>${d.baseAtk}/${d.baseDef}/${d.baseSpeed}</td><td>克${d.counter}，弱${d.weak}</td><td>${costText(d.cost)}</td><td><button ${unlocked?"":"disabled"} onclick="train('${name}')">征50人</button></td></tr>`}).join("");document.getElementById("page-barracks").innerHTML=`<h2>征兵</h2><p class="muted">升级军营可以解锁更多兵种。每次征兵以 50 人为单位。</p><table class="table"><tr><th>兵种</th><th>解锁</th><th>库存</th><th>攻/防/速</th><th>克制</th><th>50人消耗</th><th>操作</th></tr>${rows}</table>`}
function train(name){let d=troopTypes[name];if(!spend(d.cost))return;p().troopStock[name]=(p().troopStock[name]||0)+50;log(`征募${name} 50人。`);renderAll()}

function renderTeams(){let availableHeroes=p().heroes.filter(u=>!u.assignedTeam);let options=availableHeroes.map(u=>`<option value="${u.uid}">${h(u.id).name} Lv.${u.lv}</option>`).join("");let troopInputs=Object.keys(troopTypes).map(k=>`<div class="field"><label>${k}，库存${p().troopStock[k]||0}</label><input id="team_${k}" type="number" min="0" step="50" value="0"></div>`).join("");document.getElementById("page-teams").innerHTML=`<h2>军队</h2><div class="grid two"><div class="stat"><h3>创建编队</h3><p class="muted">每个队伍必须有武将带领，至少 50 兵。军队名自动为 1队、2队、3队。</p><select id="teamHero">${options}</select><br><br>${troopInputs}<button onclick="createTeam()">创建队伍</button></div><div class="stat"><h3>兵种克制</h3><p>步兵克弓兵，弓兵克骑兵，骑兵克步兵，枪兵克骑兵，器械克城防。</p><p class="muted">武将战法只作用于本队。占领地块后，该队会变成驻守状态。</p></div></div><hr class="hr"><h2>已有军队</h2><div class="list">${p().teams.map(teamCard).join("")||"<div class='item muted'>暂无队伍。</div>"}</div>`}
function teamCard(tm){
 let hero=p().heroes.find(u=>u.uid===tm.heroUid);
 let ht=hero?h(hero.id):null;

 let freeHeroes=p().heroes.filter(u=>!u.assignedTeam||u.uid===tm.heroUid);

 let heroOptions=freeHeroes.map(u=>{
  let hh=h(u.id);
  return `<option value="${u.uid}" ${u.uid===tm.heroUid?"selected":""}>${hh.name} Lv.${u.lv}</option>`;
 }).join("");

 return `<div class="item">
  <h3>${tm.name}｜${tm.status}</h3>
  <p>带队武将：${ht?ht.name:"无"} ${ht&&ht.tag?`<span class="tag">${ht.tag}</span>`:""}</p>
  <p>兵力：${tm.total}｜主力：${mainTroop(tm)}｜军势：${teamPower(tm)}</p>
  <p class="muted">兵种：${Object.entries(tm.troops).filter(x=>x[1]>0).map(([k,v])=>`${k}${v}`).join("，")}</p>

  <div class="field">
   <label>更换将领</label>
   <select id="changeHero_${tm.id}">${heroOptions}</select>
  </div>

  <button onclick="changeTeamHero('${tm.id}')">确认更换</button>
  <button onclick="disbandTeam('${tm.id}')">解散返还士兵</button>
 </div>`;
}

function changeTeamHero(teamId){
 let tm=p().teams.find(x=>x.id===teamId);

 if(!tm)return alert("队伍不存在");

 if(tm.status==="驻守"){
  return alert("驻守中的队伍不能更换将领，请先在地图撤回");
 }

 let select=document.getElementById("changeHero_"+teamId);
 let newUid=select?.value;

 if(!newUid)return alert("请选择武将");

 if(newUid===tm.heroUid)return alert("已经是当前将领");

 let oldHero=p().heroes.find(u=>u.uid===tm.heroUid);
 let newHero=p().heroes.find(u=>u.uid===newUid);

 if(!newHero)return alert("武将不存在");

 if(newHero.assignedTeam&&newHero.assignedTeam!==teamId){
  return alert("该武将已经在其他队伍中");
 }

 if(oldHero)oldHero.assignedTeam="";

 newHero.assignedTeam=teamId;
 tm.heroUid=newUid;

 log(`${tm.name}更换将领为 ${h(newHero.id).name}。`);

 renderAll();
}
function createTeam(){let uid=teamHero.value;if(!uid)return alert("没有可用武将");let troops={},total=0;for(let k of Object.keys(troopTypes)){let v=Math.floor(Number(document.getElementById("team_"+k).value||0)/50)*50;if(v<0)v=0;if(v>(p().troopStock[k]||0))return alert(k+"库存不足");troops[k]=v;total+=v}if(total<50)return alert("至少选择50兵");for(let k in troops)p().troopStock[k]-=troops[k];let no=p().nextTeamNo++;let tm={id:"team"+now()+Math.random(),name:no+"队",heroUid:uid,troops,total,status:"空闲",tile:""};p().teams.push(tm);p().heroes.find(u=>u.uid===uid).assignedTeam=tm.id;log(`创建${tm.name}。`);renderAll()}
function disbandTeam(id){let tm=p().teams.find(x=>x.id===id);if(!tm)return;if(tm.status==="驻守")return alert("驻守中的队伍不能解散，请先在地图撤回");for(let k in tm.troops)p().troopStock[k]=(p().troopStock[k]||0)+tm.troops[k];let hero=p().heroes.find(u=>u.assignedTeam===id);if(hero)hero.assignedTeam="";p().teams=p().teams.filter(x=>x.id!==id);log(`解散${tm.name}，士兵返还库存。`);renderAll()}
function teamPower(tm){let hero=p().heroes.find(u=>u.uid===tm.heroUid),ht=hero?h(hero.id):null;let hp=ht?(ht.atk*8+ht.def*7+ht.str*7+ht.spd*4+ht.siege*5+hero.lv*ht.star*30+hero.skillLv*ht.star*80):0;let tp=0;for(let [k,v] of Object.entries(tm.troops)){let d=troopTypes[k];tp+=v*(d.baseAtk+d.baseDef+d.baseSpeed)/5}return Math.floor((hp+tp)*(tm.status==="驻守"?1.05:1))}
function renderBattle(){document.getElementById("page-battle").innerHTML=`<h2>战斗页 / 战报</h2><p class="muted">大地图派军队进攻、占领、遭遇入侵军后会在这里生成战报。</p><div class="list">${p().reports.map(r=>`<div class="item"><h3>${r.title}｜${r.result}</h3><p>时间：${r.time}</p><p>我方战力：${r.atk}｜敌方战力：${r.def}｜损失：${r.loss}</p><p class="muted">${r.detail}</p></div>`).join("")||"<div class='item muted'>暂无战报。</div>"}</div>`}

function heroAvatar(name){
 return `./assets/images/heroes/${encodeURIComponent(name)}.png`;
}
function heroScore(u){
 let t=h(u.id);
 return t.atk*8+t.def*7+t.str*7+t.spd*4+t.siege*5+u.lv*t.star*30+u.skillLv*t.star*80;
}

function heroCompare(a,b){
 let ha=h(a.id),hb=h(b.id);

 if(heroSortMode==="star")return hb.star-ha.star||heroScore(b)-heroScore(a)||a.uid.localeCompare(b.uid);
 if(heroSortMode==="level")return b.lv-a.lv||hb.star-ha.star||heroScore(b)-heroScore(a);
 if(heroSortMode==="power")return heroScore(b)-heroScore(a)||hb.star-ha.star;
 if(heroSortMode==="type")return ha.type.localeCompare(hb.type)||hb.star-ha.star;
 if(heroSortMode==="name")return ha.name.localeCompare(hb.name)||hb.star-ha.star;

 return hb.star-ha.star;
}

function heroVisibleList(){
 let list=[...p().heroes];

 if(heroFilterStar!=="all"){
  list=list.filter(u=>h(u.id).star===Number(heroFilterStar));
 }

 if(heroFilterType!=="all"){
  list=list.filter(u=>h(u.id).type===heroFilterType);
 }

 if(heroFilterStatus==="free"){
  list=list.filter(u=>!u.assignedTeam);
 }

 if(heroFilterStatus==="assigned"){
  list=list.filter(u=>!!u.assignedTeam);
 }

 list.sort(heroCompare);

 return list;
}

function dungeonById(id){
 return dungeonStories.find(x=>x.id===id);
}

function dungeonAttemptKey(id){
 return dungeonDayKey()+"_"+id;
}

function dungeonAttemptsLeft(id){
 ensureDungeonData();
 let used=p().dungeons.attempts[dungeonAttemptKey(id)]||0;
 return Math.max(0,3-used);
}

function dungeonDifficultyText(d){
 return `${d.difficulty}｜奖励 ${d.rewardMin}~${d.rewardMax} 绑定元宝`;
}

function renderDungeon(){
 ensureDungeonData();

 let run=p().dungeons.run;

 if(run){
  renderDungeonRun();
  return;
 }

 document.getElementById("page-dungeon").innerHTML=`<h2>副本 / 小剧场</h2>
 <p class="muted">每个副本每天最多进行 3 次。小剧场为线性故事，途中会出现多个选择，不同选择影响结局和奖励。奖励通关后发到邮箱。</p>
 <div class="grid two">
  ${dungeonStories.map(d=>`<div class="stat">
   <h3>${d.title}</h3>
   <p class="muted">${dungeonDifficultyText(d)}</p>
   <p>${d.intro}</p>
   <p>今日剩余次数：<b class="gold">${dungeonAttemptsLeft(d.id)}</b> / 3</p>
   <button ${dungeonAttemptsLeft(d.id)<=0?"disabled":""} onclick="startDungeon('${d.id}')">进入副本</button>
  </div>`).join("")}
 </div>`;
}

function startDungeon(id){
 ensureDungeonData();

 let d=dungeonById(id);
 if(!d)return alert("副本不存在");

 let key=dungeonAttemptKey(id);
 let used=p().dungeons.attempts[key]||0;

 if(used>=3)return alert("该副本今日次数已用完");

 p().dungeons.attempts[key]=used+1;
 p().dungeons.run={
  id,
  step:0,
  score:0,
  choices:[]
 };

 log(`进入副本：${d.title}`);

 save();
 renderDungeon();
}

function renderDungeonRun(){
 ensureDungeonData();

 let run=p().dungeons.run;
 let d=dungeonById(run.id);

 if(!d){
  p().dungeons.run=null;
  renderDungeon();
  return;
 }

 let scene=d.scenes[run.step];

 if(!scene){
  finishDungeon();
  return;
 }

function chooseDungeonOption(index){
 ensureDungeonData();

 let run=p().dungeons.run;
 if(!run)return;

 let d=dungeonById(run.id);
 let scene=d.scenes[run.step];
 let choice=scene.choices[index];

 if(!choice)return alert("选项不存在");

 run.score+=choice[1];
 run.choices.push({
  step:run.step,
  text:choice[0],
  score:choice[1],
  result:choice[2]
 });

 run.step++;

 log(`副本选择：${choice[0]}。${choice[2]}`);

 save();

 if(run.step>=d.scenes.length){
  finishDungeon();
 }else{
  renderDungeon();
 }
}

function dungeonEndingText(d,score){
 if(score>=18){
  return `完美结局：${d.title}以一种离谱但圆满的方式结束。南黎不仅活着走完了全程，还获得了围观群众、路过动物以及命运本人的一致好评。`;
 }
 if(score>=10){
  return `良好结局：${d.title}顺利结束。南黎虽然中途数次把正常事情变得不正常，但总体表现可圈可点，至少没有让世界观当场崩塌。`;
 }
 if(score>=3){
  return `普通结局：${d.title}勉强通关。南黎完成了故事，也留下了一地问号。大家决定不追究细节，因为追究起来会很累。`;
 }
 return `离谱结局：${d.title}以一种很南黎的方式结束。过程难以描述，结果勉强能看，旁观者纷纷表示：这人能活到现在本身就是奇迹。`;
}

function finishDungeon(){
 ensureDungeonData();

 let run=p().dungeons.run;
 if(!run)return;

 let d=dungeonById(run.id);
 if(!d){
  p().dungeons.run=null;
  renderDungeon();
  return;
 }

 let maxScore=d.scenes.length*3;
 let fixedScore=Math.max(0,run.score);
 let ratio=Math.min(1,fixedScore/maxScore);
 let reward=d.rewardMin+Math.floor((d.rewardMax-d.rewardMin)*ratio);

 rewardToMail(
  "副本通关奖励："+d.title,
  {res:{绑定元宝:reward,铜钱:reward*2,赛季功勋:Math.floor(reward/500)}},
  `你完成了小剧场《${d.title}》。最终分数：${run.score}。${dungeonEndingText(d,run.score)}`
 );

 let choicesText=run.choices.map((c,i)=>`${i+1}. ${c.text}（${c.score>=0?"+":""}${c.score}）${c.result}`).join("\n");

 document.getElementById("page-dungeon").innerHTML=`<h2>${d.title}</h2>
 <div class="dungeon-ending">

  <p>${dungeonEndingText(d,run.score)}</p>
  <p>最终分数：<b class="gold">${run.score}</b> / ${maxScore}</p>
  <p>奖励已发送到邮箱：绑定元宝×${reward}，铜钱×${reward*2}，赛季功勋×${Math.floor(reward/500)}</p>
  <hr class="hr">

  <div class="dungeon-story">${choicesText}</div>
  <br>
  <button onclick="backToDungeonList()">返回副本列表</button>
 </div>`;

 log(`通关副本：${d.title}，奖励绑定元宝×${reward}已发邮箱。`);

 p().dungeons.run=null;
 save();
 renderRes();
}

<div class="stat"><h3>武将碎片</h3><div class="list">${heroes.filter(x=>p().frags[x.id]).map(t=>`<div class="item"><b>${t.name}</b>${t.tag?`<span class="tag">${t.tag}</span>`:""}<p>碎片：${p().frags[t.id]}/80</p><button onclick="compose(${t.id})">合成武将</button></div>`).join("")||"<p class='muted'>暂无碎片。</p>"}</div></div>
 </div>`;
}
function useLegendBox(name){if((p().bag.传说碎片宝箱||0)<1)return alert("宝箱不足");let t=heroes.find(x=>x.name===name&&x.star===7);p().bag.传说碎片宝箱--;p().frags[t.id]=(p().frags[t.id]||0)+1;log(`使用传说碎片宝箱，选择${name}碎片×1。`);renderAll()}
function useFiveBox(){if((p().bag.五星异世自选箱||0)<1)return alert("5星异世自选箱不足");let id=Number(fiveBoxSelect.value);p().bag.五星异世自选箱--;addHero(id,"5星异世自选箱");renderAll()}
function compose(id){if((p().frags[id]||0)<80)return alert("碎片不足");p().frags[id]-=80;addHero(id,"碎片合成");renderAll()}
function useSixBox(){
 if((p().bag.六星异世自选箱||0)<1)return alert("6星异世自选箱不足");

 let id=Number(sixBoxSelect.value);

 p().bag.六星异世自选箱--;

 addHero(id,"6星异世自选箱");

 renderAll();
}
function ensurePlots(){for(let y=0;y<5;y++)for(let x=0;x<5;x++){let id=x+"_"+y;if(!p().farm.plots.find(z=>z.id===id))p().farm.plots.push({id,unlocked:false,crop:"",mature:0})}}
function tickFarm(){if(!acc||!p())return;save()}
function remain(ms){let s=Math.max(0,Math.ceil((ms-now())/1000));let m=Math.floor(s/60);let r=s%60;return `${m}:${String(r).padStart(2,"0")}`}
function renderFarm(){
 ensurePlots();

 let selected=document.getElementById("seedSel")?.value||"";
 let cells="";

 for(let y=0;y<5;y++)for(let x=0;x<5;x++){
  let pl=p().farm.plots.find(z=>z.id===x+"_"+y);
  let ready=pl.crop&&now()>=pl.mature;

  cells+=`<div onclick="clickPlot('${pl.id}')" class="plot ${pl.unlocked?'':'lock'} ${ready?'ready':''}">
   ${pl.unlocked?(pl.crop?`${pl.crop}<br>${ready?"可收获":`<span class="farm-timer" data-mature="${pl.mature}">${remain(pl.mature)}</span>`}`:"空地"):"未拓建"}
  </div>`;
 }

 let count=p().farm.plots.filter(x=>x.unlocked).length;
 let expandCost={木材:500+count*200,石料:350+count*140};

 let seedOptions=allSeeds().map(s=>{
  let owned=s.special?(p().seedBag[s.name]||0):"";
  let label=s.special
   ? `${s.name}｜${s.rarity}｜库存${owned}｜成熟${s.min}分钟`
   : `${s.name}｜${s.rarity}｜需经验${s.lv}｜铜钱${s.price}`;

  return `<option value="${s.name}" ${selected===s.name?"selected":""}>${label}</option>`;
 }).join("");

 document.getElementById("page-farm").innerHTML=`<h2>独立农田 5×5</h2>
 <p class="muted">点击空地播种，点击成熟作物收获。普通种子直接用铜钱播种，特殊种子需要先去市场购买。</p>

 <div class="grid two">
  <div>
   <div class="farmgrid">${cells}</div>
  </div>

  <div class="stat">
   <h3>农田信息</h3>
   <p>种地经验：${p().farm.exp}</p>
   <p>已拓建：${count}/25</p>
   <p>下次拓建消耗：${costText(expandCost)}</p>
   <button onclick="expandFarm()">拓建一块地</button>

   <hr class="hr">

   <h3>选择种子</h3>
<select id="seedSel">${seedOptions}</select>
<br><br>
<button onclick="plantAll()">一键种植</button>
<button onclick="harvestAll()">一键收获</button>
  </div>
 </div>

 <hr class="hr">

 <h2>食材库存</h2>
 <div class="row">
  ${Object.entries(p().ingredients).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")}
 </div>

 <hr class="hr">

 <h2>特殊种子库存</h2>
 <div class="row">
  ${Object.entries(p().seedBag).filter(x=>x[1]>0).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")||"<span class='muted'>暂无特殊种子，去市场购买。</span>"}
 </div>`;
}
function expandFarm(){ensurePlots();let locked=p().farm.plots.find(x=>!x.unlocked);if(!locked)return alert("已满 5×5");let count=p().farm.plots.filter(x=>x.unlocked).length,c={木材:500+count*200,石料:350+count*140};if(!spend(c))return;locked.unlocked=true;log(`拓建农田，消耗${costText(c)}。`);renderAll()}
function clickPlot(id){
 let pl=p().farm.plots.find(x=>x.id===id);

 if(!pl.unlocked)return alert("此地未拓建");

 if(pl.crop&&now()>=pl.mature){
  let amt=2+Math.floor(Math.random()*4);

  if(specialSeeds.some(s=>s.name===pl.crop)){
   amt+=3;
  }

  p().ingredients[pl.crop]=(p().ingredients[pl.crop]||0)+amt;
  p().farm.exp+=5;

  log(`收获${pl.crop}×${amt}，种地经验+5。`);

  pl.crop="";
  pl.mature=0;

  renderAll();
  return;
 }

 if(pl.crop){
  return alert("作物还在生长，剩余 "+remain(pl.mature));
 }

 let selectedSeedName=document.getElementById("seedSel")?.value;
 let s=allSeeds().find(x=>x.name===selectedSeedName);

 if(!s)return alert("请选择种子");

 if(p().farm.exp<s.lv){
  return alert("种地经验不足");
 }

 if(s.special){
  if((p().seedBag[s.name]||0)<1){
   return alert("特殊种子库存不足，请去市场购买");
  }

  p().seedBag[s.name]--;
 }else{
  if(!spend({铜钱:s.price}))return;
 }

 pl.crop=s.name;
 pl.mature=now()+s.min*60000;

 log(`种下${s.name}，成熟时间${s.min}分钟。`);

 renderAll();
}

function plantAll(){
 ensurePlots();

 let selectedSeedName=document.getElementById("seedSel")?.value;
 let seed=allSeeds().find(x=>x.name===selectedSeedName);

 if(!seed)return alert("请选择种子");

 if(p().farm.exp<seed.lv)return alert("种地经验不足");

 let emptyPlots=p().farm.plots.filter(pl=>pl.unlocked&&!pl.crop);

 if(!emptyPlots.length)return alert("没有空地可以种植");

 let planted=0;

 for(let pl of emptyPlots){
  if(seed.special){
   if((p().seedBag[seed.name]||0)<1)break;
   p().seedBag[seed.name]--;
  }else{
   if((p().res.铜钱||0)<seed.price)break;
   p().res.铜钱-=seed.price;
  }

  pl.crop=seed.name;
  pl.mature=now()+seed.min*60000;
  planted++;
 }

 if(planted<=0){
  return alert(seed.special?"特殊种子库存不足":"铜钱不足");
 }

 log(`一键种植${seed.name}×${planted}。`);

 renderAll();
}

function harvestAll(){
 ensurePlots();

 let harvested=0;
 let gains={};

 for(let pl of p().farm.plots){
  if(pl.unlocked&&pl.crop&&now()>=pl.mature){
   let amt=2+Math.floor(Math.random()*4);

   if(specialSeeds.some(s=>s.name===pl.crop)){
    amt+=3;
   }

   gains[pl.crop]=(gains[pl.crop]||0)+amt;

   pl.crop="";
   pl.mature=0;
   harvested++;
  }
 }

 if(harvested<=0)return alert("没有成熟作物");

 for(let k in gains){
  p().ingredients[k]=(p().ingredients[k]||0)+gains[k];
 }

 p().farm.exp+=harvested*5;

 log(`一键收获 ${harvested} 块农田，获得：${costText(gains)}，种地经验+${harvested*5}。`);

 renderAll();
}
function updateFarmTimers(){
 document.querySelectorAll(".farm-timer").forEach(el=>{
  let mature=Number(el.dataset.mature||0);

  if(!mature)return;

  el.textContent=remain(mature);

  if(now()>=mature&&page==="farm"){
   renderFarm();
  }
 });
}

function marketPrice(name){
 const map={
  小麦:120,
  稻米:120,
  白菜:110,
  土豆:240,
  萝卜:240,
  玉米:280,
  灵芝:720,
  雪莲:760,
  火椒:840,
  龙牙米:1800,
  赤霞果:1900,
  玄霜菇:2000,
  金穗麦:1000,
  玄晶稻:1600,
  龙血灵芝:3200,
  天山雪莲:4800
 };

 return map[name]||160;
}

function refreshMarket(force=false){
 let q=p();

 if(!q.market){
  q.market={lastRefresh:0,stock:[]};
 }

 if(!force&&q.market.stock.length&&now()-q.market.lastRefresh<3600000){
  return;
 }

 let pool=[...specialSeeds];

 q.market.stock=[];

 for(let i=0;i<4;i++){
  let s=pick(pool);

  q.market.stock.push({
   name:s.name,
   buy:s.buy,
   rarity:s.rarity,
   min:s.min,
   lv:s.lv
  });
 }

 q.market.lastRefresh=now();

 save();
}

function renderMarket(){
 refreshMarket(false);

 let sellRows=Object.entries(p().ingredients).filter(x=>x[1]>0).map(([k,v])=>{
  let price=marketPrice(k);

  return `<tr>
   <td>${k}</td>
   <td>${v}</td>
   <td>${price} 铜钱/个</td>
   <td>
    <button onclick="sellIngredient('${k}',1)">卖1个</button>
    <button onclick="sellIngredient('${k}',${v})">全卖</button>
   </td>
  </tr>`;
 }).join("");

 let seedRows=p().market.stock.map((s,i)=>{
  return `<div class="item">
   <h3>${s.name}<span class="tag">${s.rarity}</span></h3>
   <p class="muted">成熟 ${s.min} 分钟｜需要种地经验 ${s.lv}</p>
   <p>价格：${costText(s.buy)}</p>
   <button onclick="buyMarketSeed(${i})">购买1颗</button>
  </div>`;
 }).join("");

 let left=Math.max(0,Math.ceil((3600000-(now()-p().market.lastRefresh))/60000));

 document.getElementById("page-market").innerHTML=`<h2>市场</h2>
 <div class="grid two">
  <div class="stat">
   <h3>出售作物</h3>
   <p class="muted">种田收获的作物可以在这里出售换铜钱。</p>

   <table class="table">
    <tr>
     <th>作物</th>
     <th>库存</th>
     <th>价格</th>
     <th>操作</th>
    </tr>
    ${sellRows||"<tr><td colspan='4'>暂无可出售作物</td></tr>"}
   </table>
  </div>

  <div class="stat">
   <h3>特殊种子商店</h3>
   <p class="muted">市场约每小时自动刷新，也可以花铜钱手动刷新。</p>
   <p>距离自动刷新约 ${left} 分钟</p>

   <button onclick="manualRefreshMarket()">铜钱×1000 手动刷新</button>

   <hr class="hr">

   <div class="list">${seedRows}</div>
  </div>
 </div>`;
}

function sellIngredient(name,num){
 num=Math.min(num,p().ingredients[name]||0);

 if(num<=0)return alert("库存不足");

 let price=marketPrice(name);

 p().ingredients[name]-=num;

 if(p().ingredients[name]<=0){
  delete p().ingredients[name];
 }

 gainRes({铜钱:price*num});

 log(`市场出售${name}×${num}，获得铜钱×${price*num}。`);

 renderAll();
}

function buyMarketSeed(index){
 let item=p().market.stock[index];

 if(!item)return alert("商品不存在");

 if(!spend(item.buy))return;

 p().seedBag[item.name]=(p().seedBag[item.name]||0)+1;

 log(`市场购买特殊种子：${item.name}×1。`);

 renderAll();
}

function manualRefreshMarket(){
 if(!spend({铜钱:1000}))return;

 refreshMarket(true);

 log("手动刷新市场。");

 renderAll();
}
function renderCook(){document.getElementById("page-cook").innerHTML=`<h2>厨房</h2><div class="grid two">${recipes.map(r=>`<div class="stat"><h3>${r.name}</h3><p class="muted">材料：${costText(r.cost)}</p><p>${r.effect}</p><button onclick="cook(${r.id})">制作</button></div>`).join("")}</div><hr class="hr"><h2>军粮库存</h2><div class="row">${Object.entries(p().foods).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")||"<span class='muted'>暂无</span>"}</div>`}
function cook(id){let r=recipes.find(x=>x.id===id);for(let k in r.cost)if((p().ingredients[k]||0)<r.cost[k])return alert(k+"不足");for(let k in r.cost)p().ingredients[k]-=r.cost[k];p().foods[r.name]=(p().foods[r.name]||0)+1;log("制作军粮："+r.name);renderAll()}
function renderAlliance(){document.getElementById("page-alliance").innerHTML=`<h2>同盟</h2><div class="grid two"><div class="stat"><h3>当前同盟</h3><p>${p().alliance||"未加入"}</p><input id="allyName" placeholder="同盟名"><br><br><button onclick="joinAlly()">创建 / 加入</button></div><div class="stat"><h3>多维贡献</h3><p class="muted">建设、后勤、种地、做菜、运输、侦查、守城、治疗都会给贡献。</p><button onclick="donate()">建设捐献</button></div></div>`}
function joinAlly(){let v=allyName.value.trim();if(!v)return alert("请输入同盟名");p().alliance=v;log("加入同盟："+v);renderAll()}
function donate(){if(!p().alliance)return alert("先加入同盟");if(!spend({木材:500,石料:500}))return;gainRes({同盟贡献:100});log("完成同盟建设捐献。");renderAll()}
function setChatChannel(channel){
 activeChat=channel;
 chatRendered=false;
 renderChat();
 fetchChatMessages();
}

function renderChat(){
 const box=document.getElementById("page-chat");
 if(!box)return;

 box.innerHTML=`<h2>聊天</h2>
 <div class="stat">
  <div class="chat-tabs">
   <button class="${activeChat==='world'?'active':''}" onclick="setChatChannel('world')">世界</button>
   <button class="${activeChat==='alliance'?'active':''}" onclick="setChatChannel('alliance')">同盟</button>
   <button class="${activeChat==='private'?'active':''}" onclick="setChatChannel('private')">私聊</button>
  </div>
  <p class="muted">每人每 3 秒可以发言一次。私聊对象填写对方账号，不是用户名。</p>
  <div id="chatBox" class="chat-box"></div>
  <div class="chat-input">
   <input id="chatToAcc" placeholder="私聊对象账号" ${activeChat==='private'?'':'disabled'}>
   <input id="chatText" maxlength="120" placeholder="输入聊天内容，最多120字">
   <button onclick="sendChatMessage()">发送</button>
  </div>
  <p id="chatStatus" class="muted"></p>
 </div>`;

 chatRendered=true;
 renderChatMessages();
 startChatPolling();
}

function startChatPolling(){
 if(chatTimer)return;
 fetchChatMessages();
 chatTimer=setInterval(()=>{
  if(page==="chat")fetchChatMessages();
 },1000);
}

function fetchChatMessages(){
 if(!acc||!pwdCache)return;
 fetch(`/api/chat/list?acc=${encodeURIComponent(acc)}&pwd=${encodeURIComponent(pwdCache)}&channel=${activeChat}&afterId=${chatLastId[activeChat]||0}`)
  .then(r=>r.json())
  .then(data=>{
   if(!data.ok)return;
   if(!data.messages||!data.messages.length)return;

   for(let m of data.messages){
    if(!chatMessages[activeChat].some(x=>x.id===m.id)){
     chatMessages[activeChat].push(m);
     chatLastId[activeChat]=Math.max(chatLastId[activeChat]||0,m.id);
    }
   }

   chatMessages[activeChat]=chatMessages[activeChat].slice(-120);
   renderChatMessages();
  })
  .catch(()=>{});
}

function renderChatMessages(){
 const el=document.getElementById("chatBox");
 if(!el)return;

 const oldBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-20;

 el.innerHTML=(chatMessages[activeChat]||[]).map(m=>{
  let time=new Date(m.createdAt).toLocaleTimeString();
  let title="";
  if(m.channel==="world")title=`[世界] ${m.fromName}`;
  else if(m.channel==="alliance")title=`[同盟:${m.alliance}] ${m.fromName}`;
  else title=`[私聊] ${m.fromName} → ${m.toName}`;
  return `<div class="chat-msg">
   <div class="chat-meta">${time} ${title}</div>
   <div>${escapeHtml(m.text)}</div>
  </div>`;
 }).join("")||"<div class='muted'>暂无消息。</div>";

 if(oldBottom)el.scrollTop=el.scrollHeight;
}

function sendChatMessage(){
 if(chatSending)return;

 let text=document.getElementById("chatText")?.value.trim()||"";
 let toAcc=document.getElementById("chatToAcc")?.value.trim()||"";
 let status=document.getElementById("chatStatus");

 if(!text)return alert("请输入聊天内容");
 if(activeChat==="private"&&!toAcc)return alert("请输入私聊对象账号");

 let left=Math.ceil((chatNextSendAt-Date.now())/1000);
 if(left>0)return alert(`发言太快，请 ${left} 秒后再试`);

 chatSending=true;
 if(status)status.textContent="发送中...";

 fetch("/api/chat/send",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache,channel:activeChat,toAcc,text})
 }).then(r=>r.json()).then(data=>{
  chatSending=false;
  if(!data.ok){
   if(status)status.textContent=data.message||"发送失败";
   alert(data.message||"发送失败");
   return;
  }

  chatNextSendAt=Date.now()+3000;
  document.getElementById("chatText").value="";
  if(status)status.textContent="已发送";
  fetchChatMessages();
 }).catch(()=>{
  chatSending=false;
  if(status)status.textContent="网络错误，发送失败";
 });
}

function escapeHtml(s){
 return String(s||"").replace(/[&<>"']/g,c=>({
  "&":"&amp;",
  "<":"&lt;",
  ">":"&gt;",
  '"':"&quot;",
  "'":"&#39;"
 }[c]));
}
setInterval(()=>{
 if(acc&&p()){
  collectProduction(false);

  if(page==="farm"){
   updateFarmTimers();
  }

  if(page==="market"){
   renderMarket();
  }
 }
},1000);
setInterval(()=>{
 if(acc&&p()){
  fetchAnnouncement();
 }
},5000);

if(acc&&pwdCache){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache})
 }).then(r=>r.json()).then(data=>{
  if(data.ok){
   db.users[acc]={name:data.name,a:acc,pwd:pwdCache};
   db.players[acc]=data.player;
   enter();
  }else{
   logout();
  }
 }).catch(()=>logout());
}
if(acc&&pwdCache){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache})
 }).then(r=>r.json()).then(data=>{
  if(data.ok){
   db.users[acc]={name:data.name,a:acc,pwd:pwdCache};
   db.players[acc]=data.player;
   enter();
  }else{
   logout();
  }
 }).catch(()=>logout());
}
