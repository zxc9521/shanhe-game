<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>山河余烬 V5</title>
<style>
:root{--bg:#120d09;--p:#241a12;--p2:#302216;--line:#684a2b;--gold:#e0ad4f;--txt:#f6e7c8;--mut:#bba17a;--red:#c95a4d;--green:#60b866}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#3c2917,#120d09 58%);color:var(--txt);font-family:"Microsoft YaHei",Arial,sans-serif}
button,input,select{font-family:inherit}button{background:linear-gradient(#8b5a24,#5b3416);color:#fff0c8;border:1px solid var(--gold);border-radius:8px;padding:8px 12px;cursor:pointer}button:hover{filter:brightness(1.12)}button:disabled{opacity:.45;cursor:not-allowed}
input,select{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:#100b07;color:var(--txt)}
.hidden{display:none!important}.muted{color:var(--mut);font-size:13px;line-height:1.6}.gold{color:var(--gold)}.bad{color:#ff9a8e}.ok{color:#9bef9b}
.auth{min-height:100vh;display:grid;place-items:center;padding:20px}.authbox{width:min(920px,100%);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card,.stat,.item{background:rgba(36,26,18,.94);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.title{font-size:34px;color:var(--gold);margin:0 0 10px}.field{margin-bottom:10px}.field label{display:block;color:var(--mut);font-size:13px;margin-bottom:5px}
.game{min-height:100vh;display:grid;grid-template-rows:auto 1fr}header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:rgba(18,13,9,.96);border-bottom:1px solid var(--line)}
.brand{font-size:22px;font-weight:700;color:var(--gold)}.resbar{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}.res,.pill{background:#1b120c;border:1px solid #50371f;border-radius:999px;padding:5px 9px;font-size:12px;white-space:nowrap}
.main{display:grid;grid-template-columns:190px 1fr 320px;min-height:calc(100vh - 62px)}nav{background:rgba(25,17,11,.92);border-right:1px solid var(--line);padding:12px}nav button{width:100%;margin-bottom:8px;text-align:left}
.content,.side{padding:14px;overflow:auto}.side{background:rgba(25,17,11,.92);border-left:1px solid var(--line)}
h2,h3{color:var(--gold);margin:0 0 12px}.grid{display:grid;gap:12px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.list{display:grid;gap:8px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.hr{border:0;border-top:1px solid var(--line);margin:16px 0}
.log{height:260px;overflow:auto;background:#100b07;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;line-height:1.6}
.map{display:grid;grid-template-columns:repeat(5,118px);grid-auto-rows:118px;gap:8px;background:#0e0906;border:1px solid var(--line);border-radius:14px;padding:12px;width:max-content;max-width:100%}
.mapbox{display:grid;place-items:center}
.tile{border:1px solid rgba(255,255,255,.15);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;user-select:none;font-size:13px;text-align:center}.tile:hover{outline:2px solid var(--gold)}
.owned{box-shadow:inset 0 0 0 3px #ffe08a}.garrison{box-shadow:inset 0 0 0 3px #74d7ff}.enemy{box-shadow:inset 0 0 0 3px #ff756b}.self{outline:2px solid #7fe37f}.sel{outline:2px solid #fff}
.resource{background:#315c2f}.fieldTile{background:#75632b}.salt{background:#617e82}.horse{background:#7b5332}.mine{background:#514967}.battlefield{background:#713936}.trade{background:#84602f}.npc{background:#762c2c}.city{background:#67498b}.pass{background:#4d4d4d}
.farmgrid{display:grid;grid-template-columns:repeat(5,78px);grid-auto-rows:78px;gap:6px;background:#0e0906;border:1px solid var(--line);border-radius:14px;padding:10px;width:max-content}.plot{border:1px solid rgba(255,255,255,.15);border-radius:10px;display:grid;place-items:center;text-align:center;font-size:12px;background:#2d2115;cursor:pointer}.plot.lock{background:#16110d;color:#66513a}.plot.ready{outline:2px solid #9bef9b}
.star3{color:#bdbdbd}.star4{color:#73b7ff}.star5{color:#ffd15c}.star6{color:#ff8d45}.star7{color:#d783ff}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;color:var(--mut);font-size:12px;padding:2px 7px;margin-left:4px}
.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border:1px solid var(--line);padding:8px;text-align:left}.table th{color:var(--gold);background:#1b120c}
.event-layout{display:grid;grid-template-columns:210px 1fr;gap:14px}.event-tabs{max-height:650px;overflow:auto;background:rgba(20,14,9,.8);border:1px solid var(--line);border-radius:14px;padding:10px}.event-tabs button{width:100%;margin-bottom:8px;text-align:left}.event-tabs button.active{background:linear-gradient(#b1782f,#724219)}
.mail-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#b13b32;color:#fff;font-size:12px}
.dungeon-story{background:#100b07;border:1px solid var(--line);border-radius:12px;padding:14px;line-height:1.8;white-space:pre-wrap}
.dungeon-choice{display:block;width:100%;text-align:left;margin:8px 0;padding:10px 12px}
.dungeon-ending{border:1px solid var(--gold);background:rgba(224,173,79,.08);border-radius:12px;padding:14px;line-height:1.8}
.hero-item{display:grid;grid-template-columns:76px 1fr;gap:12px;align-items:center}
.hero-avatar{width:76px;height:76px;border-radius:12px;border:1px solid var(--line);object-fit:cover;background:#100b07}
.hero-info{min-width:0}
.hero-book-card{display:grid;grid-template-columns:64px 1fr;gap:10px;align-items:center}
.hero-book-avatar{width:64px;height:64px;border-radius:10px;border:1px solid var(--line);object-fit:cover;background:#100b07}
.announce{display:none;background:linear-gradient(90deg,#5b1d16,#8b5a24,#5b1d16);border-bottom:1px solid var(--gold);color:#fff3c4;padding:8px 16px;text-align:center;font-weight:700}
.announce.show{display:block}
.chat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chat-tabs button.active{background:linear-gradient(#b1782f,#724219)}
.chat-box{height:420px;overflow:auto;background:#100b07;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;line-height:1.7}
.chat-msg{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.chat-meta{color:var(--mut);font-size:12px}
.chat-input{display:grid;grid-template-columns:160px 1fr auto;gap:8px;margin-top:10px}
@media(max-width:1050px){.chat-input{grid-template-columns:1fr}}
@media(max-width:1050px){.authbox,.main,.two,.three,.event-layout{grid-template-columns:1fr}nav{border-right:0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:8px}nav button{margin:0;text-align:center}.side{border-left:0;border-top:1px solid var(--line)}header{align-items:flex-start;flex-direction:column}.map{grid-template-columns:repeat(5,82px);grid-auto-rows:82px}.farmgrid{grid-template-columns:repeat(5,60px);grid-auto-rows:60px}}
.battle-scene{display:grid;gap:14px}
.battle-field{position:relative;min-height:330px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(rgba(20,12,6,.55),rgba(20,12,6,.85)),radial-gradient(circle at center,#65401f,#1a1009 70%);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:22px}
.battle-unit{position:relative;background:rgba(16,11,7,.78);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center;transition:transform .18s,filter .18s,box-shadow .18s}
.battle-unit.player{justify-self:start;width:min(360px,100%)}
.battle-unit.enemy{justify-self:end;width:min(360px,100%)}
.battle-unit.attack{transform:translateX(18px) scale(1.03);filter:brightness(1.25);box-shadow:0 0 20px rgba(224,173,79,.45)}
.battle-unit.enemy.attack{transform:translateX(-18px) scale(1.03)}
.battle-unit.hit{filter:brightness(1.6);box-shadow:0 0 22px rgba(201,90,77,.7)}
.battle-avatar{width:96px;height:96px;border-radius:14px;border:1px solid var(--gold);object-fit:cover;background:#100b07;margin-bottom:8px}
.hpbar{height:14px;background:#120b07;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:8px 0}
.hpfill{height:100%;background:linear-gradient(90deg,#b9312d,#f0b24d);width:100%;transition:width .25s}
.battle-vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:44px;color:var(--gold);font-weight:900;text-shadow:0 0 12px #000}
.battle-result{font-size:28px;color:var(--gold);text-align:center;margin:8px 0}
.battle-log{height:230px;overflow:auto;background:#100b07;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:13px;line-height:1.7}
.battle-log div{border-bottom:1px solid rgba(255,255,255,.06);padding:4px 0}
.battle-field.art-bg{background-size:cover;background-position:center;background-repeat:no-repeat}
.battle-effect{position:absolute;left:50%;top:50%;width:150px;height:150px;transform:translate(-50%,-50%);background-size:contain;background-repeat:no-repeat;background-position:center;pointer-events:none;opacity:0}
.battle-effect.show{animation:battleEffectPop .42s ease-out}
.battle-effect.slash{background-image:url("./assets/images/battle/effect_slash.png")}
.battle-effect.arrow{background-image:url("./assets/images/battle/effect_arrow.png")}
.battle-effect.charge{background-image:url("./assets/images/battle/effect_charge.png")}
@keyframes battleEffectPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.55) rotate(-12deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.45) rotate(12deg)}}
.battle-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.battle-skip{background:linear-gradient(#7d3428,#4d1d17);border-color:#ff9a8e}
.res-icon{width:18px;height:18px;object-fit:contain;vertical-align:-4px;margin-right:4px}
.building-card{display:grid;grid-template-columns:72px 1fr;gap:12px;align-items:center}
.building-icon{width:72px;height:72px;border-radius:12px;border:1px solid var(--line);object-fit:cover;background:#100b07}
.building-info{min-width:0}
.map-icon{width:48px;height:48px;object-fit:contain;display:block;margin-bottom:4px}
.tile{position:relative}
.tile-owner-avatar{position:absolute;right:5px;top:5px;width:24px;height:24px;border-radius:50%;border:1px solid var(--gold);object-fit:cover;background:#100b07;box-shadow:0 0 8px rgba(0,0,0,.55)}
.troop-icon{width:22px;height:22px;object-fit:contain;vertical-align:-6px;margin-right:4px}
.troop-mini-row{display:flex;gap:2px;flex-wrap:wrap;align-items:center;margin-top:8px}
.troop-mini{width:18px;height:18px;object-fit:contain}
.troop-mini-more{font-size:12px;color:var(--mut);margin-left:4px}
.team-hero-block{display:grid;grid-template-columns:1fr;gap:6px}
.battle-summary{border:1px solid var(--gold);border-radius:16px;padding:16px;background:rgba(16,11,7,.92);box-shadow:0 0 28px rgba(224,173,79,.22)}
.battle-summary-art{min-height:190px;border-radius:14px;border:1px solid var(--line);background-size:cover;background-position:center;background-repeat:no-repeat;display:grid;place-items:center;text-align:center;overflow:hidden;margin-bottom:12px}
.battle-summary-art.victory{background-image:linear-gradient(rgba(20,12,6,.15),rgba(20,12,6,.65)),url("./assets/images/battle/result_victory.png")}
.battle-summary-art.defeat{background-image:linear-gradient(rgba(20,12,6,.20),rgba(20,12,6,.75)),url("./assets/images/battle/result_defeat.png")}
.battle-summary-title{font-size:42px;font-weight:900;color:var(--gold);text-shadow:0 3px 10px #000}
.battle-summary-sub{color:#fff3c4;text-shadow:0 2px 8px #000;margin-top:6px}
.battle-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}
.battle-summary-stat{background:#100b07;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.battle-summary-stat b{display:block;color:var(--gold);font-size:20px;margin-top:4px}
.battle-countdown{color:var(--mut);font-size:13px}
@media(max-width:1050px){.battle-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.battle-summary-title{font-size:32px}}
.black-layout{display:grid;grid-template-columns:1fr 320px;gap:14px}
.black-screen{background:radial-gradient(circle at top,#1f2a3b,#07090d 70%);border:1px solid #5d7fa8;border-radius:16px;padding:14px;box-shadow:0 0 26px rgba(80,150,255,.18)}
.black-chart{width:100%;height:320px;background:#05070a;border:1px solid #26364a;border-radius:12px}
.black-side{display:grid;gap:12px}
.black-asset{background:#100b07;border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer}
.black-asset.active{border-color:#74d7ff;box-shadow:0 0 14px rgba(116,215,255,.3)}
.black-man{display:grid;grid-template-columns:74px 1fr;gap:10px;align-items:center;background:#080608;border:1px solid #3b2b47;border-radius:14px;padding:12px}
.black-man-face{width:74px;height:74px;border-radius:12px;background:linear-gradient(#1b1b24,#050507);border:1px solid #6e5b87;display:grid;place-items:center;font-size:38px}
.black-news{background:#080608;border:1px solid #3b2b47;border-radius:12px;padding:10px;line-height:1.7}
.black-trade{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
@media(max-width:1050px){.black-layout{grid-template-columns:1fr}.black-trade{grid-template-columns:1fr}}
.black-man-img{width:74px;height:74px;border-radius:12px;border:1px solid #6e5b87;object-fit:cover;background:#050507}
.black-profit{font-size:13px;margin-top:4px}
.black-news-list{display:grid;gap:8px}
.black-news-item{background:#080608;border:1px solid #3b2b47;border-radius:10px;padding:9px;line-height:1.6}
.black-news-item b{color:var(--gold)}
.black-trade-list{max-height:260px;overflow:auto;background:#080608;border:1px solid #3b2b47;border-radius:12px;padding:8px}
.black-trade-row{border-bottom:1px solid rgba(255,255,255,.07);padding:6px 0;font-size:13px;line-height:1.5}
.black-up{color:#9bef9b}
.black-down{color:#ff9a8e}
.black-flat{color:var(--mut)}
.boss-panel{display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:center;background:linear-gradient(135deg,rgba(32,8,8,.95),rgba(15,10,18,.95));border:1px solid #9b3b32;border-radius:16px;padding:12px;box-shadow:0 0 24px rgba(201,90,77,.22)}
.boss-avatar{width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(201,90,77,.45))}
.boss-name{color:#ffb36b;font-weight:900;font-size:18px;margin-bottom:6px}
.boss-bubble{position:relative;background:#100b07;border:1px solid #9b3b32;border-radius:12px;padding:10px 12px;line-height:1.7;color:#ffe0b0}
.boss-bubble:before{content:"";position:absolute;left:-10px;top:34px;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:10px solid #9b3b32}
.boss-bubble:after{content:"";position:absolute;left:-8px;top:35px;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:9px solid #100b07}
.boss-countdown{color:#ff9a8e;font-weight:700;margin-top:8px}
@media(max-width:1050px){.boss-panel{grid-template-columns:80px 1fr}.boss-avatar{width:80px;height:80px}}
.guide-mask{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:9998;display:grid;place-items:center;padding:18px}
.guide-box{width:min(560px,100%);background:linear-gradient(145deg,#2b1b10,#120b07);border:1px solid var(--gold);border-radius:18px;padding:18px;box-shadow:0 0 38px rgba(224,173,79,.32)}
.guide-title{font-size:24px;color:var(--gold);font-weight:900;margin-bottom:10px}
.guide-text{line-height:1.8;color:var(--txt);white-space:pre-wrap}
.guide-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:16px}
.guide-step{color:var(--mut);font-size:13px;margin-top:10px}
.guide-glow{outline:3px solid var(--gold)!important;box-shadow:0 0 20px rgba(224,173,79,.55)!important;position:relative;z-index:9999}
.task-card{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.task-progress{height:10px;background:#100b07;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:8px 0}
.task-progress-fill{height:100%;background:linear-gradient(90deg,#8b5a24,#e0ad4f);width:0}
.task-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.task-tabs button.active{background:linear-gradient(#b1782f,#724219)}
.player-head{display:flex;align-items:center;gap:10px}
.player-avatar{width:52px;height:52px;border-radius:12px;border:1px solid var(--gold);object-fit:cover;background:#100b07}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.avatar-choice{background:#100b07;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center;cursor:pointer}
.avatar-choice:hover{border-color:var(--gold);filter:brightness(1.1)}
.avatar-choice.active{border-color:var(--gold);box-shadow:0 0 16px rgba(224,173,79,.35)}
.avatar-choice img{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#100b07;border:1px solid var(--line)}
.avatar-choice div{font-size:12px;color:var(--mut);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<audio id="bgm" src="./assets/audio/bgm.mp3" loop></audio>
<section id="auth" class="auth">
  <div class="authbox">
    <div class="card">
      <h1 class="title">山河余烬 V5</h1>
      <p class="muted">HTML 本地原型。注册需要用户名、账号、密码；登录只需要账号和密码。</p>
      <h2>注册</h2>
      <div class="field"><label>用户名</label><input id="regName" placeholder="例如：天策将军"></div>
      <div class="field"><label>账号</label><input id="regAcc" placeholder="例如：player001"></div>
      <div class="field"><label>密码</label><input id="regPwd" type="password"></div>
      <button onclick="register()">注册并进入</button>
    </div>
    <div class="card">
      <h2>登录</h2>
      <div class="field"><label>账号</label><input id="logAcc"></div>
      <div class="field"><label>密码</label><input id="logPwd" type="password"></div>
      <button onclick="login()">登录</button>
      <hr class="hr">
      <p class="muted">V5：强者令兑换加入强者降临，兑换奖励发邮箱；传说之路资源产出提高。</p>
    </div>
  </div>
</section>

<section id="game" class="game hidden">
<div id="announcementBar" class="announce"></div>
<header>
  <div class="player-head">
  <img id="playerAvatar" class="player-avatar" src="./assets/images/avatars/avatar_general_male.png">
  <div>
    <div class="brand">山河余烬</div>
    <div id="pinfo" class="muted"></div>
  </div>
</div>
  <div id="resbar" class="resbar"></div>
  <div class="row">
  <button id="bgmBtn" onclick="toggleBgm()">音乐：关</button>
  <button onclick="logout()">退出</button>
</div>
</header>
<div class="main">
<nav>
  <button onclick="show('home')">主页建筑</button>
  <button onclick="show('map')">大地图</button>
  <button onclick="show('barracks')">征兵</button>
  <button onclick="show('teams')">军队</button>
  <button onclick="show('battle')">战斗</button>
<button onclick="show('dungeon')">副本</button>
  <button onclick="show('heroes')">武将</button>
  <button onclick="show('recruit')">招募</button>
  <button onclick="show('events')">限时活动</button>
<button onclick="show('tasks')">每日/周常</button>
  <button onclick="show('bag')">背包</button>
  <button onclick="show('farm')">种地</button>
<button onclick="show('market')">市场</button>
<button onclick="show('blackMarket')">黑市</button>
  <button onclick="show('cook')">厨房</button>
  <button onclick="show('alliance')">同盟</button>
<button onclick="show('chat')">聊天</button>
</nav>
<main class="content">
  <section id="page-home"></section><section id="page-map" class="hidden"></section>
  <section id="page-barracks" class="hidden"></section><section id="page-teams" class="hidden"></section>
  <section id="page-battle" class="hidden"></section><section id="page-battleScene" class="hidden"></section><section id="page-dungeon" class="hidden"></section><section id="page-heroes" class="hidden"></section>
  <section id="page-recruit" class="hidden"></section><section id="page-events" class="hidden"></section><section id="page-tasks" class="hidden"></section>
  <section id="page-bag" class="hidden"></section><section id="page-farm" class="hidden"></section>
<section id="page-market" class="hidden"></section><section id="page-blackMarket" class="hidden"></section><section id="page-cook" class="hidden"></section><section id="page-alliance" class="hidden"></section>
<section id="page-chat" class="hidden"></section>

function maybeStartGuide(){
 if(!acc||!p())return;
 if(p().guide&&p().guide.done)return;
 setTimeout(()=>showGuideStep(p().guide?.step||0),500);
}

function showGuideStep(index){
 if(!p().guide)p().guide={done:false,step:0};

 if(index>=guideSteps.length){
  finishGuide();
  return;
 }

 let step=guideSteps[index];
 p().guide.step=index;

 if(step.page&&page!==step.page){
  show(step.page);
 }

 const mask=document.getElementById("guideMask");
 const title=document.getElementById("guideTitle");
 const text=document.getElementById("guideText");
 const stepText=document.getElementById("guideStep");

 if(!mask||!title||!text||!stepText)return;

 title.textContent=step.title;
 text.textContent=step.text;
 stepText.textContent=`教程进度：${index+1} / ${guideSteps.length}`;

 mask.classList.remove("hidden");
 save();
}

function nextGuide(){
 if(!p().guide)p().guide={done:false,step:0};

 let index=p().guide.step||0;
 let step=guideSteps[index];

 if(step&&step.finish){
  finishGuide();
  return;
 }

 showGuideStep(index+1);
}

function skipGuide(){
 if(!confirm("确定跳过新手教程吗？以后不会自动弹出。"))return;
 finishGuide();
}

function finishGuide(){
 if(!p().guide)p().guide={};
 p().guide.done=true;
 p().guide.step=guideSteps.length;
 save();

 const mask=document.getElementById("guideMask");
 if(mask)mask.classList.add("hidden");

 log("完成新手教程。");
 renderAll();
}

function restartGuide(){
 if(!p().guide)p().guide={};
 p().guide.done=false;
 p().guide.step=0;
 save();
 showGuideStep(0);
}

function collectProduction(showLog=false){

 if(!q.productionBuildings){
  q.productionBuildings={
   耕地:{count:1,lv:1},
   林场:{count:1,lv:1},
   采矿场:{count:1,lv:1},
   坊市:{count:1,lv:1}
  };
 }

 let diff=now()-q.lastProduce;

 if(diff<60000)return;

 let minutes=Math.min(720,Math.floor(diff/60000));

  粮草:minutes*field*50,
  木材:minutes*wood*35,
  石料:minutes*mine*25,
  铁矿:minutes*mine*25,
  铜钱:minutes*market*40
 };

 gainRes(reward);

 if(showLog){
  log(`生产建筑产出：${costText(reward)}`);
 }else{
  save();
  renderRes();
 }
}

function scaleCost(base,multi){
 let cost={};
 for(let k in base){
  cost[k]=Math.ceil(base[k]*multi);
 }
 return cost;
}

}

function battleDamage(attacker,defender,attackerType,defenderType){
 let factor=counterFactor(attackerType,defenderType);
 let random=0.85+Math.random()*0.3;
 let raw=attacker.atk*factor*random-defender.def*0.35;
 let damage=Math.max(30,Math.floor(raw));
 let crit=Math.random()<0.12;

 if(crit)damage=Math.floor(damage*1.6);

 return {damage,crit,factor};
}

function battleNextRound(){
 if(!currentBattle||currentBattle.result)return;

 let b=currentBattle;
 let team=p().teams.find(x=>x.id===b.teamId);

 if(!team){
  battleLog("队伍不存在，战斗中止。");
  finishBattleScene("失败");
  return;
 }

 b.animPlayer="attack";
b.animEnemy="hit";
b.effect=battleEffectByType(b.player.type);
b.effectShow=true;
renderBattleScene();

 setTimeout(()=>{
  let hit=battleDamage(b.player,b.enemy,b.player.type,b.enemy.type);
  b.enemy.hp-=hit.damage;

  battleLog(`第 ${b.round} 回合：${b.player.name} 发起攻击，造成 ${hit.damage} 伤害${hit.crit?"，触发暴击":""}${hit.factor>1?"，兵种克制生效":hit.factor<1?"，兵种被克制":""}。`);

  b.animPlayer="";
b.animEnemy="";
b.effectShow=false;
renderBattleScene();

  if(b.enemy.hp<=0){
   finishBattleScene("胜利");
   return;
  }

  setTimeout(()=>{
   b.animEnemy="attack";
b.animPlayer="hit";
b.effect=battleEffectByType(b.enemy.type);
b.effectShow=true;
renderBattleScene();

   setTimeout(()=>{
    let back=battleDamage(b.enemy,b.player,b.enemy.type,b.player.type);
    b.player.hp-=back.damage;

    battleLog(`第 ${b.round} 回合：${b.enemy.name} 反击，造成 ${back.damage} 伤害${back.crit?"，触发暴击":""}${back.factor>1?"，敌方克制我方":back.factor<1?"，敌方被克制":""}。`);

    b.animEnemy="";
b.animPlayer="";
b.effectShow=false;
renderBattleScene();

    if(b.player.hp<=0){
     finishBattleScene("失败");
     return;
    }

    b.round++;
    b.timer=setTimeout(battleNextRound,800);
   },300);
  },350);
 },300);
}

function skipBattleScene(){
 if(!currentBattle||currentBattle.result)return;

 if(!confirm("确定跳过战斗并直接结算吗？"))return;

 let b=currentBattle;

 if(b.timer){
  clearTimeout(b.timer);
  b.timer=null;
 }

 b.animPlayer="";
 b.animEnemy="";
 b.effectShow=false;

 battleLog("你选择跳过战斗，系统开始快速结算。");

 for(let i=0;i<60;i++){
  let hit=battleDamage(b.player,b.enemy,b.player.type,b.enemy.type);
  b.enemy.hp-=hit.damage;
  battleLog(`快速结算：我方造成 ${hit.damage} 伤害${hit.crit?"，暴击":""}。`);

  if(b.enemy.hp<=0){
   finishBattleScene("胜利");
   return;
  }

  let back=battleDamage(b.enemy,b.player,b.enemy.type,b.player.type);
  b.player.hp-=back.damage;
  battleLog(`快速结算：敌方造成 ${back.damage} 伤害${back.crit?"，暴击":""}。`);

  if(b.player.hp<=0){
   finishBattleScene("失败");
   return;
  }

  b.round++;
 }

 if(b.enemy.hp<=b.player.hp){
  finishBattleScene("胜利");
 }else{
  finishBattleScene("失败");
 }
}

function heroCompare(a,b){
 let ha=h(a.id),hb=h(b.id);

 if(heroSortMode==="star")return hb.star-ha.star||heroScore(b)-heroScore(a)||a.uid.localeCompare(b.uid);
 if(heroSortMode==="level")return b.lv-a.lv||hb.star-ha.star||heroScore(b)-heroScore(a);
 if(heroSortMode==="power")return heroScore(b)-heroScore(a)||hb.star-ha.star;
 if(heroSortMode==="type")return ha.type.localeCompare(hb.type)||hb.star-ha.star;
 if(heroSortMode==="name")return ha.name.localeCompare(hb.name)||hb.star-ha.star;

 return hb.star-ha.star;
}

function startDungeon(id){

 p().dungeons.attempts[key]=used+1;
 p().dungeons.run={
  id,
  node:d.start,

function renderDungeonRun(){
 ensureDungeonData();

 let run=p().dungeons.run;
 let d=dungeonById(run.id);

 if(!d){
  p().dungeons.run=null;
  renderDungeon();
  return;
 }

 let node=d.nodes[run.node];

 if(!node){
  p().dungeons.run=null;
  renderDungeon();
  return;
 }

 if(node.ending){
  finishDungeon(node);
  return;
 }

 document.getElementById("page-dungeon").innerHTML=`<h2>${d.title}</h2>

function chooseDungeonOption(index){
 ensureDungeonData();

 let run=p().dungeons.run;
 if(!run)return;

 let d=dungeonById(run.id);
 let node=d.nodes[run.node];

 if(!node||node.ending)return;

 let choice=node.choices[index];

 if(!choice)return alert("选项不存在");

 run.score+=choice.score;
 run.steps++;
 run.lastEvent=choice.event;
 run.choices.push({
  node:run.node,
  text:choice.text,
  score:choice.score,
  event:choice.event,
  next:choice.next
 });

 run.node=choice.next;

 log(`副本选择：${choice.text}。${choice.event}`);

 save();
 renderDungeon();
}

function finishDungeon(endingNode){
 ensureDungeonData();

 let run=p().dungeons.run;
 if(!run)return;

 let d=dungeonById(run.id);

 if(!d){
  p().dungeons.run=null;
  renderDungeon();
  return;
 }

 let maxScore=Math.max(21,run.steps*3);
 let fixedScore=Math.max(0,run.score);
 let ratio=Math.min(1,fixedScore/maxScore);
 let reward=d.rewardMin+Math.floor((d.rewardMax-d.rewardMin)*ratio);

 if(run.score>=18){
  sendWorldBanner(`副本传说！${p().name} 完美通关《${d.title}》，南黎的离谱故事再添神话！`);

 rewardToMail(

  {res:{绑定元宝:reward,铜钱:reward*2,赛季功勋:Math.floor(reward/500)}},
  `你完成了分支小剧场《${d.title}》。最终分数：${run.score}。${endingNode.text}`
 );

 let choicesText=run.choices.map((c,i)=>`${i+1}. ${c.text}（${c.score>=0?"+":""}${c.score}）\n结果：${c.event}`).join("\n\n");

 document.getElementById("page-dungeon").innerHTML=`<h2>${d.title}</h2>
 <div class="dungeon-ending">
  <h3>通关完成</h3>
  <p>${endingNode.text}</p>
  <p>最终分数：<b class="gold">${run.score}</b> / ${maxScore}</p>
  <p>奖励已发送到邮箱：绑定元宝×${reward}，铜钱×${reward*2}，赛季功勋×${Math.floor(reward/500)}</p>

  <hr class="hr">

  <h3>本次选择记录</h3>
  <div class="dungeon-story">${choicesText}</div>

  <br>

  <button onclick="backToDungeonList()">返回副本列表</button>
 </div>`;

addTaskProgress("dungeonClear",1);
 log(`通关副本：${d.title}，奖励绑定元宝×${reward}已发邮箱。`);

 p().dungeons.run=null;
 save();
 renderRes();
}

function taskDayKey(){
 return new Date().toISOString().slice(0,10);
}

function taskWeekKey(){
 const d=new Date();
 const oneJan=new Date(d.getFullYear(),0,1);
 const day=Math.floor((d-oneJan)/86400000);
 const week=Math.ceil((day+oneJan.getDay()+1)/7);
 return `${d.getFullYear()}-W${week}`;
}

function refreshTaskPeriod(q=p()){
 if(!q.tasks)q.tasks={dailyKey:"",weeklyKey:"",daily:{},weekly:{},claimedDaily:{},claimedWeekly:{}};

 let dayKey=taskDayKey();
 let weekKey=taskWeekKey();

 if(q.tasks.dailyKey!==dayKey){
  q.tasks.dailyKey=dayKey;
  q.tasks.daily={};
  q.tasks.claimedDaily={};
 }

 if(q.tasks.weeklyKey!==weekKey){
  q.tasks.weeklyKey=weekKey;
  q.tasks.weekly={};
  q.tasks.claimedWeekly={};
 }
}

function taskProgress(type,key){
 refreshTaskPeriod();
 return type==="daily"?(p().tasks.daily[key]||0):(p().tasks.weekly[key]||0);
}

function taskClaimed(type,key){
 return type==="daily"?!!p().tasks.claimedDaily[key]:!!p().tasks.claimedWeekly[key];
}

function claimTask(type,key){
 refreshTaskPeriod();

 let list=type==="daily"?dailyTasks:weeklyTasks;
 let task=list.find(x=>x.key===key);
 if(!task)return alert("任务不存在");

 let progress=taskProgress(type,key);
 if(progress<task.need)return alert("任务未完成");

 if(taskClaimed(type,key))return alert("奖励已领取");

 if(type==="daily")p().tasks.claimedDaily[key]=true;
 else p().tasks.claimedWeekly[key]=true;

 rewardToMail(
  `${type==="daily"?"每日任务":"周常任务"}：${task.title}`,
  task.reward,
  "任务奖励已发放，请领取附件。"
 );

 renderAll();
}

function renderTaskList(type){
 let list=type==="daily"?dailyTasks:weeklyTasks;

 return `<div class="list">${list.map(task=>{
  let progress=taskProgress(type,task.key);
  let done=progress>=task.need;
  let claimed=taskClaimed(type,task.key);
  let percent=Math.min(100,Math.floor(progress/task.need*100));

  return `<div class="item task-card">
   <div>
    <h3>${task.title}</h3>
    <p class="muted">奖励：${rewardText(task.reward)}</p>
    <div class="task-progress"><div class="task-progress-fill" style="width:${percent}%"></div></div>

   </div>
   <button ${!done||claimed?"disabled":""} onclick="claimTask('${type}','${task.key}')">${claimed?"已领取":done?"领取":"未完成"}</button>
  </div>`;
 }).join("")}</div>`;
}

function clickPlot(id){

 if(pl.crop&&now()>=pl.mature){

  p().farm.exp+=5;

  log(`收获${pl.crop}×${amt}，种地经验+5。`);

 }

 let selectedSeedName=document.getElementById("seedSel")?.value;
 let s=allSeeds().find(x=>x.name===selectedSeedName);

 if(p().farm.exp<s.lv){

 }

 if(s.special){

  }

  p().seedBag[s.name]--;
 }else{

 }

 pl.crop=s.name;
 pl.mature=now()+s.min*60000;

 log(`种下${s.name}，成熟时间${s.min}分钟。`);

}

function plantAll(){
 ensurePlots();

 let selectedSeedName=document.getElementById("seedSel")?.value;
 let seed=allSeeds().find(x=>x.name===selectedSeedName);

 if(!seed)return alert("请选择种子");

 if(p().farm.exp<seed.lv)return alert("种地经验不足");

 let emptyPlots=p().farm.plots.filter(pl=>pl.unlocked&&!pl.crop);

 if(!emptyPlots.length)return alert("没有空地可以种植");

 let planted=0;

 for(let pl of emptyPlots){
  if(seed.special){
   if((p().seedBag[seed.name]||0)<1)break;
   p().seedBag[seed.name]--;
  }else{
   if((p().res.铜钱||0)<seed.price)break;
   p().res.铜钱-=seed.price;
  }

  pl.crop=seed.name;
  pl.mature=now()+seed.min*60000;
  planted++;
 }

 if(planted<=0){
  return alert(seed.special?"特殊种子库存不足":"铜钱不足");
 }

 log(`一键种植${seed.name}×${planted}。`);

 renderAll();
}

function harvestAll(){
 ensurePlots();

 let harvested=0;
 let gains={};

 for(let pl of p().farm.plots){
  if(pl.unlocked&&pl.crop&&now()>=pl.mature){
   let amt=2+Math.floor(Math.random()*4);

   if(specialSeeds.some(s=>s.name===pl.crop)){
    amt+=3;
   }

   gains[pl.crop]=(gains[pl.crop]||0)+amt;

   pl.crop="";
   pl.mature=0;
   harvested++;
  }
 }

 if(harvested<=0)return alert("没有成熟作物");

 for(let k in gains){
  p().ingredients[k]=(p().ingredients[k]||0)+gains[k];
 }

 p().farm.exp+=harvested*5;
addTaskProgress("farmHarvest",harvested);

 log(`一键收获 ${harvested} 块农田，获得：${costText(gains)}，种地经验+${harvested*5}。`);

 renderAll();
}

function blackMarketAssetStats(asset){
 let history=asset.history||[];

 if(history.length<2){
  return {cls:"black-flat",text:"暂无涨跌"};
 }

 let last=history[history.length-1].price;
 let prev=history[history.length-2].price;
 let diff=last-prev;
 let pct=prev?diff/prev*100:0;

 if(diff>0){
  return {cls:"black-up",text:`上涨 +${diff}（+${pct.toFixed(2)}%）`};
 }

 if(diff<0){
  return {cls:"black-down",text:`下跌 ${diff}（${pct.toFixed(2)}%）`};
 }

 return {cls:"black-flat",text:"持平"};
}

function blackMarketProfit(asset){
 let id=asset.id;
 let qty=blackMarketHolding(id);
 let avg=blackMarketState?.avgCost?.[id]||0;

 if(!qty||!avg){
  return {cls:"black-flat",text:"暂无持仓"};
 }

 let profit=(asset.price-avg)*qty;
 let pct=avg?((asset.price-avg)/avg*100):0;

 if(profit>0){
  return {cls:"black-up",text:`浮盈 +${Math.floor(profit)}（+${pct.toFixed(2)}%）`};
 }

 if(profit<0){
  return {cls:"black-down",text:`浮亏 ${Math.floor(profit)}（${pct.toFixed(2)}%）`};
 }

 return {cls:"black-flat",text:"盈亏持平"};
}

function drawBlackChart(asset){
 const canvas=document.getElementById("blackChart");
 if(!canvas||!asset)return;

 const ctx=canvas.getContext("2d");
 const w=canvas.width;
 const h=canvas.height;
 const pad=42;
 const history=asset.history||[];

 ctx.clearRect(0,0,w,h);

 const bg=ctx.createLinearGradient(0,0,0,h);
 bg.addColorStop(0,"#07111d");
 bg.addColorStop(1,"#030507");
 ctx.fillStyle=bg;
 ctx.fillRect(0,0,w,h);

 ctx.strokeStyle="#1f3148";
 ctx.lineWidth=1;

 for(let i=0;i<6;i++){
  let y=pad+(h-pad*2)/5*i;
  ctx.beginPath();
  ctx.moveTo(pad,y);
  ctx.lineTo(w-pad,y);
  ctx.stroke();
 }

 for(let i=0;i<8;i++){
  let x=pad+(w-pad*2)/7*i;
  ctx.beginPath();
  ctx.moveTo(x,pad);
  ctx.lineTo(x,h-pad);
  ctx.stroke();
 }

 if(history.length<2){
  ctx.fillStyle="#bba17a";
  ctx.font="16px Microsoft YaHei";
  ctx.fillText("暂无曲线数据，等待下次刷新。",pad,40);
  return;
 }

 let prices=history.map(x=>x.price);
 let min=Math.min(...prices);
 let max=Math.max(...prices);
 if(max===min)max=min+1;

 function px(i){
  return pad+(w-pad*2)*(i/(history.length-1));
 }

 function py(price){
  return h-pad-(h-pad*2)*((price-min)/(max-min));
 }

 ctx.beginPath();
 history.forEach((point,i)=>{
  let x=px(i);
  let y=py(point.price);
  if(i===0)ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });

 ctx.lineTo(px(history.length-1),h-pad);
 ctx.lineTo(px(0),h-pad);
 ctx.closePath();

 let fill=ctx.createLinearGradient(0,pad,0,h-pad);
 fill.addColorStop(0,"rgba(116,215,255,.28)");
 fill.addColorStop(1,"rgba(116,215,255,.02)");
 ctx.fillStyle=fill;
 ctx.fill();

 ctx.beginPath();
 history.forEach((point,i)=>{
  let x=px(i);
  let y=py(point.price);
  if(i===0)ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });

 ctx.strokeStyle="#74d7ff";
 ctx.lineWidth=3;
 ctx.stroke();

 history.forEach((point,i)=>{
  let x=px(i);
  let y=py(point.price);

  ctx.fillStyle=i===history.length-1?"#9bef9b":"#e0ad4f";
  ctx.beginPath();
  ctx.arc(x,y,i===history.length-1?5:3,0,Math.PI*2);
  ctx.fill();
 });

 let first=history[0].price;
 let last=history[history.length-1].price;
 let diff=last-first;
 let percent=first?diff/first*100:0;

 ctx.fillStyle="#e0ad4f";
 ctx.font="16px Microsoft YaHei";
 ctx.fillText(`最高 ${max}`,pad,24);
 ctx.fillText(`最低 ${min}`,pad,h-12);

 ctx.fillStyle=diff>=0?"#9bef9b":"#ff9a8e";
 ctx.fillText(`区间涨跌 ${diff>=0?"+":""}${diff}（${percent>=0?"+":""}${percent.toFixed(2)}%）`,w-260,24);
}

  if(data.yuanbao!=null){
   p().res.元宝=data.yuanbao;
  }

  document.getElementById("blackNews").textContent=data.text;
  log("购买黑市内幕消息。");
  renderRes();
 }).catch(()=>alert("黑衣人消失了，交易失败。"));
}

function startBlackMarketTimer(){
 if(blackMarketTimer)return;

 blackMarketTimer=setInterval(()=>{
 },60000);
}
function renderMarket(){
 refreshMarket(false);

 let sellRows=Object.entries(p().ingredients).filter(x=>x[1]>0).map(([k,v])=>{
  let price=marketPrice(k);

  return `<tr>
   <td>${k}</td>
   <td>${v}</td>
   <td>${price} 铜钱/个</td>
   <td>
    <button onclick="sellIngredient('${k}',1)">卖1个</button>
    <button onclick="sellIngredient('${k}',${v})">全卖</button>
   </td>
  </tr>`;
 }).join("");

 let seedRows=p().market.stock.map((s,i)=>{
  return `<div class="item">
   <h3>${s.name}<span class="tag">${s.rarity}</span></h3>
   <p class="muted">成熟 ${s.min} 分钟｜需要种地经验 ${s.lv}</p>
   <p>价格：${costText(s.buy)}</p>
   <button onclick="buyMarketSeed(${i})">购买1颗</button>
  </div>`;
 }).join("");

 let left=Math.max(0,Math.ceil((3600000-(now()-p().market.lastRefresh))/60000));

 document.getElementById("page-market").innerHTML=`<h2>市场</h2>
 <div class="grid two">
  <div class="stat">
   <h3>出售作物</h3>
   <p class="muted">种田收获的作物可以在这里出售换铜钱。</p>

   <table class="table">
    <tr>
     <th>作物</th>
     <th>库存</th>
     <th>价格</th>
     <th>操作</th>
    </tr>
    ${sellRows||"<tr><td colspan='4'>暂无可出售作物</td></tr>"}
   </table>
  </div>

  <div class="stat">
   <h3>特殊种子商店</h3>
   <p class="muted">市场约每小时自动刷新，也可以花铜钱手动刷新。</p>
   <p>距离自动刷新约 ${left} 分钟</p>

   <button onclick="manualRefreshMarket()">铜钱×1000 手动刷新</button>

   <hr class="hr">

   <div class="list">${seedRows}</div>
  </div>
 </div>`;
}

function sellIngredient(name,num){
 num=Math.min(num,p().ingredients[name]||0);

 if(num<=0)return alert("库存不足");

 let price=marketPrice(name);

 p().ingredients[name]-=num;

 if(p().ingredients[name]<=0){
  delete p().ingredients[name];
 }

 gainRes({铜钱:price*num});

addTaskProgress("marketSell",1);
 log(`市场出售${name}×${num}，获得铜钱×${price*num}。`);

 renderAll();
}

function buyMarketSeed(index){
 let item=p().market.stock[index];

 if(!item)return alert("商品不存在");

 if(!spend(item.buy))return;

 p().seedBag[item.name]=(p().seedBag[item.name]||0)+1;

 log(`市场购买特殊种子：${item.name}×1。`);

 renderAll();
}

function manualRefreshMarket(){
 if(!spend({铜钱:1000}))return;

 refreshMarket(true);

 log("手动刷新市场。");

 renderAll();
}
function renderCook(){document.getElementById("page-cook").innerHTML=`<h2>厨房</h2><div class="grid two">${recipes.map(r=>`<div class="stat"><h3>${r.name}</h3><p class="muted">材料：${costText(r.cost)}</p><p>${r.effect}</p><button onclick="cook(${r.id})">制作</button></div>`).join("")}</div><hr class="hr"><h2>军粮库存</h2><div class="row">${Object.entries(p().foods).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")||"<span class='muted'>暂无</span>"}</div>`}
function cook(id){let r=recipes.find(x=>x.id===id);for(let k in r.cost)if((p().ingredients[k]||0)<r.cost[k])return alert(k+"不足");for(let k in r.cost)p().ingredients[k]-=r.cost[k];p().foods[r.name]=(p().foods[r.name]||0)+1;log("制作军粮："+r.name);renderAll()}
function renderAlliance(){document.getElementById("page-alliance").innerHTML=`<h2>同盟</h2><div class="grid two"><div class="stat"><h3>当前同盟</h3><p>${p().alliance||"未加入"}</p><input id="allyName" placeholder="同盟名"><br><br><button onclick="joinAlly()">创建 / 加入</button></div><div class="stat"><h3>多维贡献</h3><p class="muted">建设、后勤、种地、做菜、运输、侦查、守城、治疗都会给贡献。</p><button onclick="donate()">建设捐献</button></div></div>`}
function joinAlly(){let v=allyName.value.trim();if(!v)return alert("请输入同盟名");p().alliance=v;log("加入同盟："+v);renderAll()}
function donate(){if(!p().alliance)return alert("先加入同盟");if(!spend({木材:500,石料:500}))return;gainRes({同盟贡献:100});log("完成同盟建设捐献。");renderAll()}
function setChatChannel(channel){
 activeChat=channel;
 chatRendered=false;
 renderChat();
 fetchChatMessages();
}

function renderChat(){
 const box=document.getElementById("page-chat");
 if(!box)return;

 box.innerHTML=`<h2>聊天</h2>
 <div class="stat">
  <div class="chat-tabs">
   <button class="${activeChat==='world'?'active':''}" onclick="setChatChannel('world')">世界</button>
   <button class="${activeChat==='alliance'?'active':''}" onclick="setChatChannel('alliance')">同盟</button>
   <button class="${activeChat==='private'?'active':''}" onclick="setChatChannel('private')">私聊</button>
  </div>
  <p class="muted">每人每 3 秒可以发言一次。私聊对象填写对方账号，不是用户名。</p>
  <div id="chatBox" class="chat-box"></div>
  <div class="chat-input">
   <input id="chatToAcc" placeholder="私聊对象账号" ${activeChat==='private'?'':'disabled'}>
   <input id="chatText" maxlength="120" placeholder="输入聊天内容，最多120字">
   <button onclick="sendChatMessage()">发送</button>
  </div>
  <p id="chatStatus" class="muted"></p>
 </div>`;

 chatRendered=true;
 renderChatMessages();
 startChatPolling();
}

function startChatPolling(){
 if(chatTimer)return;
 fetchChatMessages();
 chatTimer=setInterval(()=>{
  if(page==="chat")fetchChatMessages();
 },1000);
}

function fetchChatMessages(){
 if(!acc||!pwdCache)return;
 fetch(`/api/chat/list?acc=${encodeURIComponent(acc)}&pwd=${encodeURIComponent(pwdCache)}&channel=${activeChat}&afterId=${chatLastId[activeChat]||0}`)
  .then(r=>r.json())
  .then(data=>{
   if(!data.ok)return;
   if(!data.messages||!data.messages.length)return;

   for(let m of data.messages){
    if(!chatMessages[activeChat].some(x=>x.id===m.id)){
     chatMessages[activeChat].push(m);
     chatLastId[activeChat]=Math.max(chatLastId[activeChat]||0,m.id);
    }
   }

   chatMessages[activeChat]=chatMessages[activeChat].slice(-120);
   renderChatMessages();
  })
  .catch(()=>{});
}

function renderChatMessages(){
 const el=document.getElementById("chatBox");
 if(!el)return;

 const oldBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-20;

 el.innerHTML=(chatMessages[activeChat]||[]).map(m=>{
  let time=new Date(m.createdAt).toLocaleTimeString();
  let title="";
  if(m.channel==="world")title=`[世界] ${m.fromName}`;
  else if(m.channel==="alliance")title=`[同盟:${m.alliance}] ${m.fromName}`;
  else title=`[私聊] ${m.fromName} → ${m.toName}`;
  return `<div class="chat-msg">
   <div class="chat-meta">${time} ${title}</div>
   <div>${escapeHtml(m.text)}</div>
  </div>`;
 }).join("")||"<div class='muted'>暂无消息。</div>";

 if(oldBottom)el.scrollTop=el.scrollHeight;
}

function sendChatMessage(){
 if(chatSending)return;

 let text=document.getElementById("chatText")?.value.trim()||"";
 let toAcc=document.getElementById("chatToAcc")?.value.trim()||"";
 let status=document.getElementById("chatStatus");

 if(!text)return alert("请输入聊天内容");
 if(activeChat==="private"&&!toAcc)return alert("请输入私聊对象账号");

 let left=Math.ceil((chatNextSendAt-Date.now())/1000);
 if(left>0)return alert(`发言太快，请 ${left} 秒后再试`);

 chatSending=true;
 if(status)status.textContent="发送中...";

 fetch("/api/chat/send",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache,channel:activeChat,toAcc,text})
 }).then(r=>r.json()).then(data=>{
  chatSending=false;
  if(!data.ok){
   if(status)status.textContent=data.message||"发送失败";
   alert(data.message||"发送失败");
   return;
  }

  chatNextSendAt=Date.now()+3000;
  document.getElementById("chatText").value="";
  if(status)status.textContent="已发送";
addTaskProgress("chat",1);
  fetchChatMessages();
 }).catch(()=>{
  chatSending=false;
  if(status)status.textContent="网络错误，发送失败";
 });
}

function escapeHtml(s){
 return String(s||"").replace(/[&<>"']/g,c=>({
  "&":"&amp;",
  "<":"&lt;",
  ">":"&gt;",
  '"':"&quot;",
  "'":"&#39;"
 }[c]));
}
setInterval(()=>{
 if(acc&&p()){
  collectProduction(false);
spawnInvasionIfNeeded();

  if(page==="farm"){
   updateFarmTimers();
  }

  if(page==="market"){
   renderMarket();
  }
    if(page==="map"){
   bossLineTick++;
   if(bossLineTick>=6){
    bossLineTick=0;
    bossLineIndex++;
    renderMap();
   }
  }
 }
},1000);
setInterval(()=>{
 if(acc&&p()){
  fetchAnnouncement();
 }
},5000);

if(acc&&pwdCache){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache})
 }).then(r=>r.json()).then(data=>{
  if(data.ok){
   db.users[acc]={name:data.name,a:acc,pwd:pwdCache};
   db.players[acc]=data.player;
   enter();
  }else{
   logout();
  }
 }).catch(()=>logout());
}
