function collectProduction(showLog=false){
 if(!acc||!p())return;
 let q=p();
 if(!q.lastProduce)q.lastProduce=now();

 let diff=now()-q.lastProduce;
 if(diff<60000)return;

 let minutes=Math.min(720,Math.floor(diff/60000));
 q.lastProduce+=minutes*60000;

 let field=q.buildings.耕地||1;
 let wood=q.buildings.林场||1;
 let mine=q.buildings.采矿场||1;

 let reward={
  粮草:minutes*field*50,
  木材:minutes*wood*35,
  石料:minutes*mine*25,
  铁矿:minutes*mine*25
 };

 gainRes(reward);

 if(showLog){
  log(`资源建筑产出：${costText(reward)}`);
 }else{
  save();
  renderRes();
 }
}

function teamName(id){let tm=p().teams.find(x=>x.id===id);return tm?tm.name:"未知"}
function counterFactor(type,enemyType){if(!enemyType)return 1;return troopTypes[type]?.counter===enemyType?1.18:troopTypes[type]?.weak===enemyType?0.88:1}
function resolveTileBattle(team,tile){let enemyType=tile.enemy?"骑兵":tile.type==="city"||tile.type==="pass"?"城防":pick(["民兵","步兵","弓兵","枪兵","骑兵"]);let atk=teamPower(team)*counterFactor(mainTroop(team),enemyType)*(0.9+Math.random()*0.2);let def=(tile.guard+(tile.enemy?2500:0))*(tile.garrisonTeam?1.35:1)*(0.9+Math.random()*0.2);let win=atk>=def,loss=Math.ceil(team.total*(win?0.08+Math.random()*0.08:0.18+Math.random()*0.15));applyTeamLoss(team,loss);return {id:"r"+now()+Math.random(),time:new Date().toLocaleString(),title:`${team.name} 进攻 ${tileName(tile.type)} ${tile.x},${tile.y}`,result:win?"胜利":"失败",atk:Math.floor(atk),def:Math.floor(def),loss,enemyType,detail:`兵种克制：我方主力${mainTroop(team)}，敌方${enemyType}。胜利后必须驻守才能保有地块。`}}
function mainTroop(team){let arr=Object.entries(team.troops).sort((a,b)=>b[1]-a[1]);return arr[0]?.[0]||"民兵"}
function applyTeamLoss(team,loss){let left=loss;for(let k of Object.keys(team.troops)){let cut=Math.min(team.troops[k],left);team.troops[k]-=cut;left-=cut;if(left<=0)break}team.total=Object.values(team.troops).reduce((a,b)=>a+b,0)}

function unlockedTroops(){let lv=p().buildings.军营;return Object.keys(troopTypes).filter(k=>lv>=troopTypes[k].unlock)}
function renderBarracks(){let rows=Object.entries(troopTypes).map(([name,d])=>{let unlocked=p().buildings.军营>=d.unlock;return `<tr><td>${name}</td><td>${unlocked?"已解锁":"军营Lv."+d.unlock}</td><td>${p().troopStock[name]||0}</td><td>${d.baseAtk}/${d.baseDef}/${d.baseSpeed}</td><td>克${d.counter}，弱${d.weak}</td><td>${costText(d.cost)}</td><td><button ${unlocked?"":"disabled"} onclick="train('${name}')">征50人</button></td></tr>`}).join("");document.getElementById("page-barracks").innerHTML=`<h2>征兵</h2><p class="muted">升级军营可以解锁更多兵种。每次征兵以 50 人为单位。</p><table class="table"><tr><th>兵种</th><th>解锁</th><th>库存</th><th>攻/防/速</th><th>克制</th><th>50人消耗</th><th>操作</th></tr>${rows}</table>`}
function train(name){let d=troopTypes[name];if(!spend(d.cost))return;p().troopStock[name]=(p().troopStock[name]||0)+50;log(`征募${name} 50人。`);renderAll()}

function renderTeams(){let availableHeroes=p().heroes.filter(u=>!u.assignedTeam);let options=availableHeroes.map(u=>`<option value="${u.uid}">${h(u.id).name} Lv.${u.lv}</option>`).join("");let troopInputs=Object.keys(troopTypes).map(k=>`<div class="field"><label>${k}，库存${p().troopStock[k]||0}</label><input id="team_${k}" type="number" min="0" step="50" value="0"></div>`).join("");document.getElementById("page-teams").innerHTML=`<h2>军队</h2><div class="grid two"><div class="stat"><h3>创建编队</h3><p class="muted">每个队伍必须有武将带领，至少 50 兵。军队名自动为 1队、2队、3队。</p><select id="teamHero">${options}</select><br><br>${troopInputs}<button onclick="createTeam()">创建队伍</button></div><div class="stat"><h3>兵种克制</h3><p>步兵克弓兵，弓兵克骑兵，骑兵克步兵，枪兵克骑兵，器械克城防。</p><p class="muted">武将战法只作用于本队。占领地块后，该队会变成驻守状态。</p></div></div><hr class="hr"><h2>已有军队</h2><div class="list">${p().teams.map(teamCard).join("")||"<div class='item muted'>暂无队伍。</div>"}</div>`}
function teamCard(tm){let hero=p().heroes.find(u=>u.uid===tm.heroUid),ht=hero?h(hero.id):null;return `<div class="item"><h3>${tm.name}｜${tm.status}</h3><p>带队武将：${ht?ht.name:"无"} ${ht&&ht.tag?`<span class="tag">${ht.tag}</span>`:""}</p><p>兵力：${tm.total}｜主力：${mainTroop(tm)}｜军势：${teamPower(tm)}</p><p class="muted">兵种：${Object.entries(tm.troops).filter(x=>x[1]>0).map(([k,v])=>`${k}${v}`).join("，")}</p><button onclick="disbandTeam('${tm.id}')">解散返还士兵</button></div>`}
function createTeam(){let uid=teamHero.value;if(!uid)return alert("没有可用武将");let troops={},total=0;for(let k of Object.keys(troopTypes)){let v=Math.floor(Number(document.getElementById("team_"+k).value||0)/50)*50;if(v<0)v=0;if(v>(p().troopStock[k]||0))return alert(k+"库存不足");troops[k]=v;total+=v}if(total<50)return alert("至少选择50兵");for(let k in troops)p().troopStock[k]-=troops[k];let no=p().nextTeamNo++;let tm={id:"team"+now()+Math.random(),name:no+"队",heroUid:uid,troops,total,status:"空闲",tile:""};p().teams.push(tm);p().heroes.find(u=>u.uid===uid).assignedTeam=tm.id;log(`创建${tm.name}。`);renderAll()}
function disbandTeam(id){let tm=p().teams.find(x=>x.id===id);if(!tm)return;if(tm.status==="驻守")return alert("驻守中的队伍不能解散，请先在地图撤回");for(let k in tm.troops)p().troopStock[k]=(p().troopStock[k]||0)+tm.troops[k];let hero=p().heroes.find(u=>u.assignedTeam===id);if(hero)hero.assignedTeam="";p().teams=p().teams.filter(x=>x.id!==id);log(`解散${tm.name}，士兵返还库存。`);renderAll()}
function teamPower(tm){let hero=p().heroes.find(u=>u.uid===tm.heroUid),ht=hero?h(hero.id):null;let hp=ht?(ht.atk*8+ht.def*7+ht.str*7+ht.spd*4+ht.siege*5+hero.lv*ht.star*30+hero.skillLv*ht.star*80):0;let tp=0;for(let [k,v] of Object.entries(tm.troops)){let d=troopTypes[k];tp+=v*(d.baseAtk+d.baseDef+d.baseSpeed)/5}return Math.floor((hp+tp)*(tm.status==="驻守"?1.05:1))}
function renderBattle(){document.getElementById("page-battle").innerHTML=`<h2>战斗页 / 战报</h2><p class="muted">大地图派军队进攻、占领、遭遇入侵军后会在这里生成战报。</p><div class="list">${p().reports.map(r=>`<div class="item"><h3>${r.title}｜${r.result}</h3><p>时间：${r.time}</p><p>我方战力：${r.atk}｜敌方战力：${r.def}｜损失：${r.loss}</p><p class="muted">${r.detail}</p></div>`).join("")||"<div class='item muted'>暂无战报。</div>"}</div>`}

function renderHeroes(){document.getElementById("page-heroes").innerHTML=`<h2>武将</h2><div class="list">${p().heroes.map(u=>{let t=h(u.id);return `<div class="item"><b class="star${t.star}">${"★".repeat(t.star)} ${t.name}</b>${t.tag?`<span class="tag">${t.tag}</span>`:""}<p class="muted">Lv.${u.lv}｜${t.type}｜${t.skill}</p><p>归属：${u.assignedTeam?teamName(u.assignedTeam):"未编队"}</p><button onclick="lvHero('${u.uid}')">升级</button> <button onclick="skillHero('${u.uid}')">升战法</button></div>`}).join("")}</div><hr class="hr"><h2>图鉴</h2><div class="grid two">${heroes.map(t=>`<div class="stat"><h3 class="star${t.star}">${"★".repeat(t.star)} ${t.name}${t.tag?`<span class="tag">${t.tag}</span>`:""}</h3><p class="muted">${t.type}｜武${t.atk} 防${t.def} 谋${t.str} 速${t.spd} 攻${t.siege}</p><p class="muted">${t.skill}</p></div>`).join("")}</div>`}
function lvHero(uid){let u=p().heroes.find(x=>x.uid==uid);if(!spend({铜钱:u.lv*300}))return;u.lv++;log(`${h(u.id).name}升级。`);renderAll()}
function skillHero(uid){let u=p().heroes.find(x=>x.uid==uid);if(!spend({战法残卷:u.skillLv*50}))return;u.skillLv++;log(`${h(u.id).name}战法升级。`);renderAll()}

function addHero(id,source){let t=h(id);if(p().heroes.some(u=>u.id===id)){p().frags[id]=(p().frags[id]||0)+10;log(`重复获得${t.name}，转碎片×10。`)}else{p().heroes.push(inst(id));log(`获得武将：${t.name}${t.tag?"（"+t.tag+"）":""}`)}p().recruitLogs.unshift({time:new Date().toLocaleString(),source,result:t.name+(t.tag?"（"+t.tag+"）":"")});p().recruitLogs=p().recruitLogs.slice(0,60)}
function addFrag(id,num,source){let t=h(id);p().frags[id]=(p().frags[id]||0)+num;p().recruitLogs.unshift({time:new Date().toLocaleString(),source,result:`${t.name}碎片×${num}`});p().recruitLogs=p().recruitLogs.slice(0,60);log(`获得${t.name}碎片×${num}。`)}
function renderRecruit(){document.getElementById("page-recruit").innerHTML=`<h2>招募</h2><div class="grid two"><div class="stat"><h3>常驻招募</h3><p class="muted">只出普通武将，不会出现异世限定武将。最高 5 星。</p><p>消耗：招募令×1</p><button onclick="drawNormal()">招募一次</button></div><div class="stat"><h3>限定招募：异世武将</h3><p class="muted">本赛季限定池，只出现异世武将。异世武将不进入常驻池。</p><p>消耗：限定招募令×1 或绑定元宝×180</p><button onclick="drawLimited(false)">用限定令</button> <button onclick="drawLimited(true)">用元宝</button></div></div><hr class="hr"><h2>招募记录</h2><div class="list">${p().recruitLogs.map(x=>`<div class="item"><b>${x.source}</b><p>${x.result}</p><p class="muted">${x.time}</p></div>`).join("")||"<div class='item muted'>暂无招募记录。</div>"}</div>`}
function drawNormal(){if(!spend({招募令:1}))return;let pool=heroes.filter(x=>!x.tag&&x.star<=5);let r=Math.random(),s=r<.04?5:r<.22?4:3;addHero(pick(pool.filter(x=>x.star===s)).id,"常驻招募");renderAll()}
function drawLimited(gold){if(gold){if(!spend({绑定元宝:180}))return}else if(!spend({限定招募令:1}))return;let pool=heroes.filter(x=>x.tag==="异世武将");let r=Math.random();if(r<.01)addHero(pick(pool.filter(x=>x.star===7)).id,"限定招募");else if(r<.08)addHero(pick(pool.filter(x=>x.star===6)).id,"限定招募");else if(r<.42)addHero(pick(pool.filter(x=>x.star===5)).id,"限定招募");else{let t=pick(pool.filter(x=>x.star<=6));addFrag(t.id,t.star===6?1:3,"限定招募")}renderAll()}

function setEvent(id){activeEvent=id;renderEvents()}
function renderEvents(){
 let tabs=[["beta","内测大礼包"],["catchup","新军追赶"],["buildGrow","建筑成长"],["occupyGrow","占地成长"],["farmGrow","种地成长"],["strong","强者降临"],["legend","传说之路"]];
 document.getElementById("page-events").innerHTML=`<h2>限时活动</h2><div class="event-layout"><div class="event-tabs">${tabs.map(t=>`<button class="${activeEvent===t[0]?"active":""}" onclick="setEvent('${t[0]}')">${t[1]}</button>`).join("")}</div><div>${renderEventContent()}</div></div>`;
}
function renderEventContent(){
 if(activeEvent==="beta")return renderBetaGiftEvent();
 if(activeEvent==="catchup")return `<div class="stat"><h3>新军追赶补给</h3><p class="muted">追赶资源只帮助基础发育。奖励会发到邮箱。</p><p>奖励：绑定元宝×800，粮草×8000，木材×5000，石料×5000，铁矿×4000，铜钱×3000，招募令×5</p><button ${p().newbie?"disabled":""} onclick="claimCatchup()">发到邮箱</button></div>`;
 if(activeEvent==="buildGrow")return renderTaskGroup("建筑升级成长奖励","每次建筑阶段突破都给奖励，奖励发到邮箱。",growthTasks.building);
 if(activeEvent==="occupyGrow")return renderTaskGroup("占领地块成长奖励","占地、击败敌军、夺取城池关卡都会给奖励。",growthTasks.occupy);
 if(activeEvent==="farmGrow")return renderTaskGroup("种地经验成长奖励","种地经验、农田拓建、解锁高级种子路线都会给奖励。",growthTasks.farm);
 if(activeEvent==="strong")return renderStrongEvent();

 return "";
}

 return `<div class="stat"><h3>${title}</h3><p class="muted">${desc}</p><div class="list">${tasks.map(t=>{let done=!!p().claimedTasks[t.key],ok=t.check(p());return `<div class="item"><h3>${t.title}</h3><p>奖励：${rewardText(t.reward)}</p><button ${done||!ok?"disabled":""} onclick="claimGrowthTask('${t.key}')">${done?"已发送":ok?"发送到邮箱":"未完成"}</button></div>`}).join("")}</div></div>`
}

  "内测大礼包",
  {
   res:{绑定元宝:100000,招募令:100},

  },
  "感谢参与内测，奖励已发放到邮箱。"
 );

}
function claimGrowthTask(key){let all=[...growthTasks.building,...growthTasks.occupy,...growthTasks.farm],task=all.find(t=>t.key===key);if(!task||p().claimedTasks[key]||!task.check(p()))return;p().claimedTasks[key]=true;rewardToMail("成长奖励："+task.title,task.reward,"你完成了成长目标，奖励已发放到邮箱。");renderAll()}

function exchangeStrongFiveBox(){if((p().res.强者令||0)<100)return alert("强者令不足，需要100");p().res.强者令-=100;rewardToMail("强者令兑换：5星异世自选箱",{bag:{五星异世自选箱:1}},"你兑换了5星异世自选箱。领取后进入背包。");renderAll()}

 </div>`;
}
function useLegendBox(name){if((p().bag.传说碎片宝箱||0)<1)return alert("宝箱不足");let t=heroes.find(x=>x.name===name&&x.star===7);p().bag.传说碎片宝箱--;p().frags[t.id]=(p().frags[t.id]||0)+1;log(`使用传说碎片宝箱，选择${name}碎片×1。`);renderAll()}
function useFiveBox(){if((p().bag.五星异世自选箱||0)<1)return alert("5星异世自选箱不足");let id=Number(fiveBoxSelect.value);p().bag.五星异世自选箱--;addHero(id,"5星异世自选箱");renderAll()}
function compose(id){if((p().frags[id]||0)<80)return alert("碎片不足");p().frags[id]-=80;addHero(id,"碎片合成");renderAll()}
function useSixBox(){
 if((p().bag.六星异世自选箱||0)<1)return alert("6星异世自选箱不足");

 let id=Number(sixBoxSelect.value);

 p().bag.六星异世自选箱--;

 addHero(id,"6星异世自选箱");

 renderAll();
}
function ensurePlots(){for(let y=0;y<5;y++)for(let x=0;x<5;x++){let id=x+"_"+y;if(!p().farm.plots.find(z=>z.id===id))p().farm.plots.push({id,unlocked:false,crop:"",mature:0})}}
function tickFarm(){if(!acc||!p())return;save()}
function remain(ms){let s=Math.max(0,Math.ceil((ms-now())/1000));let m=Math.floor(s/60);let r=s%60;return `${m}:${String(r).padStart(2,"0")}`}
function renderFarm(){
 ensurePlots();

 let selected=document.getElementById("seedSel")?.value||"";
 let cells="";

 for(let y=0;y<5;y++)for(let x=0;x<5;x++){
  let pl=p().farm.plots.find(z=>z.id===x+"_"+y);
  let ready=pl.crop&&now()>=pl.mature;

  cells+=`<div onclick="clickPlot('${pl.id}')" class="plot ${pl.unlocked?'':'lock'} ${ready?'ready':''}">
   ${pl.unlocked?(pl.crop?`${pl.crop}<br>${ready?"可收获":`<span class="farm-timer" data-mature="${pl.mature}">${remain(pl.mature)}</span>`}`:"空地"):"未拓建"}
  </div>`;
 }

 let count=p().farm.plots.filter(x=>x.unlocked).length;
 let expandCost={木材:500+count*200,石料:350+count*140};

 let seedOptions=allSeeds().map(s=>{
  let owned=s.special?(p().seedBag[s.name]||0):"";
  let label=s.special
   ? `${s.name}｜${s.rarity}｜库存${owned}｜成熟${s.min}分钟`
   : `${s.name}｜${s.rarity}｜需经验${s.lv}｜铜钱${s.price}`;

  return `<option value="${s.name}" ${selected===s.name?"selected":""}>${label}</option>`;
 }).join("");

 document.getElementById("page-farm").innerHTML=`<h2>独立农田 5×5</h2>
 <p class="muted">点击空地播种，点击成熟作物收获。普通种子直接用铜钱播种，特殊种子需要先去市场购买。</p>

 <div class="grid two">
  <div>
   <div class="farmgrid">${cells}</div>
  </div>

  <div class="stat">
   <h3>农田信息</h3>
   <p>种地经验：${p().farm.exp}</p>
   <p>已拓建：${count}/25</p>
   <p>下次拓建消耗：${costText(expandCost)}</p>
   <button onclick="expandFarm()">拓建一块地</button>

   <hr class="hr">

   <h3>选择种子</h3>
   <select id="seedSel">${seedOptions}</select>
  </div>
 </div>

 <hr class="hr">

 <h2>食材库存</h2>
 <div class="row">
  ${Object.entries(p().ingredients).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")}
 </div>

 <hr class="hr">

 <h2>特殊种子库存</h2>
 <div class="row">
  ${Object.entries(p().seedBag).filter(x=>x[1]>0).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")||"<span class='muted'>暂无特殊种子，去市场购买。</span>"}
 </div>`;
}
function expandFarm(){ensurePlots();let locked=p().farm.plots.find(x=>!x.unlocked);if(!locked)return alert("已满 5×5");let count=p().farm.plots.filter(x=>x.unlocked).length,c={木材:500+count*200,石料:350+count*140};if(!spend(c))return;locked.unlocked=true;log(`拓建农田，消耗${costText(c)}。`);renderAll()}
function clickPlot(id){
 let pl=p().farm.plots.find(x=>x.id===id);

 if(!pl.unlocked)return alert("此地未拓建");

 if(pl.crop&&now()>=pl.mature){
  let amt=2+Math.floor(Math.random()*4);

  if(specialSeeds.some(s=>s.name===pl.crop)){
   amt+=3;
  }

  p().ingredients[pl.crop]=(p().ingredients[pl.crop]||0)+amt;
  p().farm.exp+=5;

  log(`收获${pl.crop}×${amt}，种地经验+5。`);

  pl.crop="";
  pl.mature=0;

  renderAll();
  return;
 }

 if(pl.crop){
  return alert("作物还在生长，剩余 "+remain(pl.mature));
 }

 let selectedSeedName=document.getElementById("seedSel")?.value;
 let s=allSeeds().find(x=>x.name===selectedSeedName);

 if(!s)return alert("请选择种子");

 if(p().farm.exp<s.lv){
  return alert("种地经验不足");
 }

 if(s.special){
  if((p().seedBag[s.name]||0)<1){
   return alert("特殊种子库存不足，请去市场购买");
  }

  p().seedBag[s.name]--;
 }else{
  if(!spend({铜钱:s.price}))return;
 }

 pl.crop=s.name;
 pl.mature=now()+s.min*60000;

 log(`种下${s.name}，成熟时间${s.min}分钟。`);

 renderAll();
}

function updateFarmTimers(){
 document.querySelectorAll(".farm-timer").forEach(el=>{
  let mature=Number(el.dataset.mature||0);

  if(!mature)return;

  el.textContent=remain(mature);

  if(now()>=mature&&page==="farm"){
   renderFarm();
  }
 });
}

function marketPrice(name){
 const map={
  小麦:60,
  稻米:60,
  白菜:55,
  土豆:120,
  萝卜:120,
  玉米:140,
  灵芝:360,
  雪莲:380,
  火椒:420,
  龙牙米:900,
  赤霞果:950,
  玄霜菇:1000,
  金穗麦:500,
  玄晶稻:800,
  龙血灵芝:1600,
  天山雪莲:2400
 };

 return map[name]||80;
}

function refreshMarket(force=false){
 let q=p();

 if(!q.market){
  q.market={lastRefresh:0,stock:[]};
 }

 if(!force&&q.market.stock.length&&now()-q.market.lastRefresh<3600000){
  return;
 }

 let pool=[...specialSeeds];

 q.market.stock=[];

 for(let i=0;i<4;i++){
  let s=pick(pool);

  q.market.stock.push({
   name:s.name,
   buy:s.buy,
   rarity:s.rarity,
   min:s.min,
   lv:s.lv
  });
 }

 q.market.lastRefresh=now();

 save();
}

function renderMarket(){
 refreshMarket(false);

 let sellRows=Object.entries(p().ingredients).filter(x=>x[1]>0).map(([k,v])=>{
  let price=marketPrice(k);

  return `<tr>
   <td>${k}</td>
   <td>${v}</td>
   <td>${price} 铜钱/个</td>
   <td>
    <button onclick="sellIngredient('${k}',1)">卖1个</button>
    <button onclick="sellIngredient('${k}',${v})">全卖</button>
   </td>
  </tr>`;
 }).join("");

 let seedRows=p().market.stock.map((s,i)=>{
  return `<div class="item">
   <h3>${s.name}<span class="tag">${s.rarity}</span></h3>
   <p class="muted">成熟 ${s.min} 分钟｜需要种地经验 ${s.lv}</p>
   <p>价格：${costText(s.buy)}</p>
   <button onclick="buyMarketSeed(${i})">购买1颗</button>
  </div>`;
 }).join("");

 let left=Math.max(0,Math.ceil((3600000-(now()-p().market.lastRefresh))/60000));

 document.getElementById("page-market").innerHTML=`<h2>市场</h2>
 <div class="grid two">
  <div class="stat">
   <h3>出售作物</h3>
   <p class="muted">种田收获的作物可以在这里出售换铜钱。</p>

   <table class="table">
    <tr>
     <th>作物</th>
     <th>库存</th>
     <th>价格</th>
     <th>操作</th>
    </tr>
    ${sellRows||"<tr><td colspan='4'>暂无可出售作物</td></tr>"}
   </table>
  </div>

  <div class="stat">
   <h3>特殊种子商店</h3>
   <p class="muted">市场约每小时自动刷新，也可以花铜钱手动刷新。</p>
   <p>距离自动刷新约 ${left} 分钟</p>

   <button onclick="manualRefreshMarket()">铜钱×1000 手动刷新</button>

   <hr class="hr">

   <div class="list">${seedRows}</div>
  </div>
 </div>`;
}

function sellIngredient(name,num){
 num=Math.min(num,p().ingredients[name]||0);

 if(num<=0)return alert("库存不足");

 let price=marketPrice(name);

 p().ingredients[name]-=num;

 if(p().ingredients[name]<=0){
  delete p().ingredients[name];
 }

 gainRes({铜钱:price*num});

 log(`市场出售${name}×${num}，获得铜钱×${price*num}。`);

 renderAll();
}

function buyMarketSeed(index){
 let item=p().market.stock[index];

 if(!item)return alert("商品不存在");

 if(!spend(item.buy))return;

 p().seedBag[item.name]=(p().seedBag[item.name]||0)+1;

 log(`市场购买特殊种子：${item.name}×1。`);

 renderAll();
}

function manualRefreshMarket(){
 if(!spend({铜钱:1000}))return;

 refreshMarket(true);

 log("手动刷新市场。");

 renderAll();
}
function renderCook(){document.getElementById("page-cook").innerHTML=`<h2>厨房</h2><div class="grid two">${recipes.map(r=>`<div class="stat"><h3>${r.name}</h3><p class="muted">材料：${costText(r.cost)}</p><p>${r.effect}</p><button onclick="cook(${r.id})">制作</button></div>`).join("")}</div><hr class="hr"><h2>军粮库存</h2><div class="row">${Object.entries(p().foods).map(([k,v])=>`<span class="pill">${k}：${v}</span>`).join("")||"<span class='muted'>暂无</span>"}</div>`}
function cook(id){let r=recipes.find(x=>x.id===id);for(let k in r.cost)if((p().ingredients[k]||0)<r.cost[k])return alert(k+"不足");for(let k in r.cost)p().ingredients[k]-=r.cost[k];p().foods[r.name]=(p().foods[r.name]||0)+1;log("制作军粮："+r.name);renderAll()}
function renderAlliance(){document.getElementById("page-alliance").innerHTML=`<h2>同盟</h2><div class="grid two"><div class="stat"><h3>当前同盟</h3><p>${p().alliance||"未加入"}</p><input id="allyName" placeholder="同盟名"><br><br><button onclick="joinAlly()">创建 / 加入</button></div><div class="stat"><h3>多维贡献</h3><p class="muted">建设、后勤、种地、做菜、运输、侦查、守城、治疗都会给贡献。</p><button onclick="donate()">建设捐献</button></div></div>`}
function joinAlly(){let v=allyName.value.trim();if(!v)return alert("请输入同盟名");p().alliance=v;log("加入同盟："+v);renderAll()}
function donate(){if(!p().alliance)return alert("先加入同盟");if(!spend({木材:500,石料:500}))return;gainRes({同盟贡献:100});log("完成同盟建设捐献。");renderAll()}
function setChatChannel(channel){
 activeChat=channel;
 chatRendered=false;
 renderChat();
 fetchChatMessages();
}

function renderChat(){
 const box=document.getElementById("page-chat");
 if(!box)return;

 box.innerHTML=`<h2>聊天</h2>
 <div class="stat">
  <div class="chat-tabs">
   <button class="${activeChat==='world'?'active':''}" onclick="setChatChannel('world')">世界</button>
   <button class="${activeChat==='alliance'?'active':''}" onclick="setChatChannel('alliance')">同盟</button>
   <button class="${activeChat==='private'?'active':''}" onclick="setChatChannel('private')">私聊</button>
  </div>
  <p class="muted">每人每 3 秒可以发言一次。私聊对象填写对方账号，不是用户名。</p>
  <div id="chatBox" class="chat-box"></div>
  <div class="chat-input">
   <input id="chatToAcc" placeholder="私聊对象账号" ${activeChat==='private'?'':'disabled'}>
   <input id="chatText" maxlength="120" placeholder="输入聊天内容，最多120字">
   <button onclick="sendChatMessage()">发送</button>
  </div>
  <p id="chatStatus" class="muted"></p>
 </div>`;

 chatRendered=true;
 renderChatMessages();
 startChatPolling();
}

function startChatPolling(){
 if(chatTimer)return;
 fetchChatMessages();
 chatTimer=setInterval(()=>{
  if(page==="chat")fetchChatMessages();
 },1000);
}

function fetchChatMessages(){
 if(!acc||!pwdCache)return;
 fetch(`/api/chat/list?acc=${encodeURIComponent(acc)}&pwd=${encodeURIComponent(pwdCache)}&channel=${activeChat}&afterId=${chatLastId[activeChat]||0}`)
  .then(r=>r.json())
  .then(data=>{
   if(!data.ok)return;
   if(!data.messages||!data.messages.length)return;

   for(let m of data.messages){
    if(!chatMessages[activeChat].some(x=>x.id===m.id)){
     chatMessages[activeChat].push(m);
     chatLastId[activeChat]=Math.max(chatLastId[activeChat]||0,m.id);
    }
   }

   chatMessages[activeChat]=chatMessages[activeChat].slice(-120);
   renderChatMessages();
  })
  .catch(()=>{});
}

function renderChatMessages(){
 const el=document.getElementById("chatBox");
 if(!el)return;

 const oldBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-20;

 el.innerHTML=(chatMessages[activeChat]||[]).map(m=>{
  let time=new Date(m.createdAt).toLocaleTimeString();
  let title="";
  if(m.channel==="world")title=`[世界] ${m.fromName}`;
  else if(m.channel==="alliance")title=`[同盟:${m.alliance}] ${m.fromName}`;
  else title=`[私聊] ${m.fromName} → ${m.toName}`;
  return `<div class="chat-msg">
   <div class="chat-meta">${time} ${title}</div>
   <div>${escapeHtml(m.text)}</div>
  </div>`;
 }).join("")||"<div class='muted'>暂无消息。</div>";

 if(oldBottom)el.scrollTop=el.scrollHeight;
}

function sendChatMessage(){
 if(chatSending)return;

 let text=document.getElementById("chatText")?.value.trim()||"";
 let toAcc=document.getElementById("chatToAcc")?.value.trim()||"";
 let status=document.getElementById("chatStatus");

 if(!text)return alert("请输入聊天内容");
 if(activeChat==="private"&&!toAcc)return alert("请输入私聊对象账号");

 let left=Math.ceil((chatNextSendAt-Date.now())/1000);
 if(left>0)return alert(`发言太快，请 ${left} 秒后再试`);

 chatSending=true;
 if(status)status.textContent="发送中...";

 fetch("/api/chat/send",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache,channel:activeChat,toAcc,text})
 }).then(r=>r.json()).then(data=>{
  chatSending=false;
  if(!data.ok){
   if(status)status.textContent=data.message||"发送失败";
   alert(data.message||"发送失败");
   return;
  }

  chatNextSendAt=Date.now()+3000;
  document.getElementById("chatText").value="";
  if(status)status.textContent="已发送";
  fetchChatMessages();
 }).catch(()=>{
  chatSending=false;
  if(status)status.textContent="网络错误，发送失败";
 });
}

function escapeHtml(s){
 return String(s||"").replace(/[&<>"']/g,c=>({
  "&":"&amp;",
  "<":"&lt;",
  ">":"&gt;",
  '"':"&quot;",
  "'":"&#39;"
 }[c]));
}
setInterval(()=>{
 if(acc&&p()){
  collectProduction(false);

  if(page==="farm"){
   updateFarmTimers();
  }

  if(page==="market"){
   renderMarket();
  }
 }
},1000);
setInterval(()=>{
 if(acc&&p()){
  fetchAnnouncement();
 }
},5000);

if(acc&&pwdCache){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache})
 }).then(r=>r.json()).then(data=>{
  if(data.ok){
   db.users[acc]={name:data.name,a:acc,pwd:pwdCache};
   db.players[acc]=data.player;
   enter();
  }else{
   logout();
  }
 }).catch(()=>logout());
}
if(acc&&pwdCache){
 fetch("/api/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({acc,pwd:pwdCache})
 }).then(r=>r.json()).then(data=>{
  if(data.ok){
   db.users[acc]={name:data.name,a:acc,pwd:pwdCache};
   db.players[acc]=data.player;
   enter();
  }else{
   logout();
  }
 }).catch(()=>logout());
}
</script>
